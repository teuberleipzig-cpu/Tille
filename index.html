    :root{--orange:#e49a78;--olive:#8d8969;--yellow:#f0ed40;--grey:#d9d9d9}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;color:#000;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.12}a{color:inherit;text-decoration:none}.page{width:800px;min-height:100vh;display:grid;grid-template-columns:606px 194px;background:#fff}.main{padding:18px 58px 14px 30px;background:#fff}.sidebar{background:#000;color:#fff;padding:93px 14px 14px 24px;min-height:100vh}.logo{width:280px;height:78px;position:relative;margin:0 0 8px -35px;border-bottom:0;overflow:visible}.logo img{display:block;width:280px;height:78px;object-fit:contain}.nav{width:470px;margin-bottom:30px;font-size:13px;font-weight:900;text-transform:uppercase;line-height:1.13}.nav a{display:inline-block;padding:0 2px;margin:0 1px 3px 0;background:var(--grey);color:#000}.nav a:hover,.nav a.active{color:#fff;background:#000}.event{margin:0 0 18px 0;max-width:518px}.event-title{display:inline;padding:0 4px 0 0;font-size:18px;font-weight:900;line-height:1.02;letter-spacing:.2px;text-transform:uppercase}.event-title.olive{background:var(--olive)}.event-title.orange{background:var(--orange)}.event-title.yellow{background:var(--yellow)}.label{margin-top:3px}.line strong{font-size:16px;font-weight:900;letter-spacing:.2px}.artist-link:hover{background:#000;color:#fff}.more{display:inline-block;background:var(--grey);padding:0 3px;margin-top:1px;font-weight:700}.more:hover{background:#000;color:#fff}.event-hero{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;margin:0 0 14px}.event-description{margin-top:18px;max-width:435px;line-height:1.22;white-space:pre-wrap}.back-link{display:inline-block;background:var(--grey);font-weight:900;padding:0 3px;margin:0 0 14px}.back-link:hover{background:#000;color:#fff}.footer{margin-top:92px;font-size:11px;font-weight:900;text-transform:uppercase}.footer small{display:block;margin-top:4px;font-size:10px;font-weight:400;text-transform:none}.calendar-head{width:154px;display:grid;grid-template-columns:20px 1fr 20px;align-items:center;margin-bottom:4px;font-size:10px;font-weight:900;text-align:center}.calendar-head .cal-nav,.calendar-head .month{background:#4b4b4b;height:15px;line-height:15px;color:#fff}.calendar-head .cal-nav{border:0;padding:0;font:inherit;font-weight:900;cursor:pointer}.calendar-head .month{margin:0 3px;text-transform:uppercase;white-space:nowrap;overflow:hidden;font-size:10px;letter-spacing:-.2px}.calendar{width:154px;border-collapse:collapse;margin-bottom:18px;color:#fff;font-size:13px;line-height:1}.calendar th,.calendar td{width:22px;height:18px;text-align:center;padding:0}.calendar th{font-size:11px;color:#fff}.calendar td.event-day{cursor:pointer;font-weight:900}.calendar td a{display:block;width:100%;height:18px;line-height:18px;color:inherit;text-decoration:none}.calendar .day-orange{background:#b38368;color:#000}.calendar .day-olive{background:#8d8969;color:#000}.calendar .day-yellow{background:#d7d43d;color:#000}.no-events{font-size:14px;font-weight:900;margin:0 0 18px}.side-block{margin-bottom:16px}.side-title{display:inline-block;background:var(--orange);color:#000;padding:1px 2px;font-size:13px;font-weight:900;text-transform:uppercase}.side-link{display:block;width:max-content;max-width:155px;background:#c6c6b1;color:#000;padding:1px 2px;font-size:13px;font-weight:900;text-transform:uppercase;margin-top:2px}.side-link:hover{background:#000;color:#fff}.newsletter{margin-top:10px;margin-bottom:18px;font-size:13px;font-weight:900;text-transform:uppercase}.newsletter label{display:inline-block;margin-top:9px}.newsletter input{width:106px;height:22px;border:0;margin-left:6px;vertical-align:middle;background:#fff}.newsletter button{display:block;margin:5px 0 0 91px;border:0;background:#000;color:#fff;font-size:13px;font-weight:900;text-decoration:underline;cursor:pointer;padding:0;font-family:Arial,Helvetica,sans-serif}.poster{width:154px;height:218px;margin:0 0 7px 0;background:linear-gradient(135deg,rgba(0,0,0,.28),rgba(255,255,255,.18)),repeating-linear-gradient(90deg,#6d8a5e 0 31px,#d4b28d 31px 62px,#73886d 62px 93px,#c49374 93px 124px),repeating-linear-gradient(0deg,transparent 0 52px,rgba(255,255,255,.25) 52px 54px);position:relative;overflow:hidden}.poster:before{content:"M\A A\A R\A Z";white-space:pre;position:absolute;left:58px;top:24px;background:rgba(255,255,255,.85);color:#000;font-size:26px;line-height:1.45;font-weight:900;letter-spacing:2px;padding:1px 8px;text-align:center;transform:rotate(-2deg)}.poster:after{content:"MRZ 16\A DISTILLERY";white-space:pre;position:absolute;right:8px;top:8px;color:#fff;background:#000;font-size:9px;line-height:1.1;padding:3px 4px;text-align:center}.download-pdf,.calendar-download{display:block;width:max-content;background:#c6c6b1;color:#000;padding:1px 2px;font-size:13px;font-weight:900;text-transform:uppercase;margin-bottom:36px}.download-pdf:hover,.calendar-download:hover{background:#000;color:#fff}.device-row{width:154px;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:9px}.computer{width:69px;height:87px;border:3px solid #888;background:#c9c9c9;position:relative}.phone{width:29px;height:74px;border:3px solid #888;background:#d3d3d3;position:relative;margin-right:4px}.loading,.error{font-size:14px;font-weight:900}@media(max-width:820px){.page{width:100%;grid-template-columns:minmax(0,1fr)}.main{padding-right:24px}.sidebar{padding-top:24px;min-height:0}}

  <script>
    const EVENTS_DATA_URL = 'public/events/data/events.json';
    const WEEKDAYS = ['SO', 'MO', 'DI', 'MI', 'DO', 'FR', 'SA'];
    const MONTHS = ['JANUAR', 'FEBRUAR', 'MÄRZ', 'APRIL', 'MAI', 'JUNI', 'JULI', 'AUGUST', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DEZEMBER'];
    let allEvents = [];
    let activeYear = new Date().getFullYear();
    let activeMonth = new Date().getMonth() + 1;

    function esc(value){ return String(value ?? '').replace(/[&<>"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char])); }
    function slug(text){ return String(text||'event').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'event'; }
    function getEventId(event){ return event.id || slug(`${event.date || ''} ${event.title || 'event'}`); }
    function parseEventDate(isoDate){ if(!isoDate) return null; const date = new Date(`${isoDate}T12:00:00`); return Number.isNaN(date.getTime()) ? null : date; }
    function formatEventDate(isoDate){ const date = parseEventDate(isoDate); if(!date) return ''; return `${WEEKDAYS[date.getDay()]}. ${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getFullYear()).slice(-2)}`; }
    function getMonthEvents(events, year, month){ return events.filter(event => { const date = parseEventDate(event.date); return date && date.getFullYear() === year && date.getMonth()+1 === month; }); }
    function getCurrentEventId(){ return new URLSearchParams(location.search).get('event'); }
    function showListUrl(){ return `index.html?month=${activeYear}-${String(activeMonth).padStart(2,'0')}`; }
    function pickInitialMonth(events, meta){ const fromUrl = new URLSearchParams(location.search).get('month'); if(/^\d{4}-\d{2}$/.test(fromUrl || '')){ const [y,m]=fromUrl.split('-').map(Number); activeYear=y; activeMonth=m; return; } const validDates = events.map(event => parseEventDate(event.date)).filter(Boolean).sort((a,b)=>a-b); const today = new Date(); const thisMonthStart = new Date(today.getFullYear(), today.getMonth(), 1); const nextEventDate = validDates.find(date => date >= thisMonthStart) || validDates[0]; if(nextEventDate){ activeYear=nextEventDate.getFullYear(); activeMonth=nextEventDate.getMonth()+1; return; } if(meta.calendarYear && meta.calendarMonth){ activeYear=Number(meta.calendarYear); activeMonth=Number(meta.calendarMonth); } }
    function changeMonth(direction){ const next = new Date(activeYear, activeMonth - 1 + direction, 1); activeYear = next.getFullYear(); activeMonth = next.getMonth()+1; history.replaceState(null,'',showListUrl()); renderCurrentMonth(); }
    function renderArtist(item){ const name = item.link ? `<a class="artist-link" href="${esc(item.link)}" target="_blank" rel="noopener noreferrer"><strong>${esc(item.name)}</strong></a>` : `<strong>${esc(item.name)}</strong>`; const info = item.info ? ` (${esc(item.info)})` : ''; return `<span class="artist">${name}${info}</span>`; }
    function renderEvent(event){ const sections = (event.sections || []).map(section => { const items = (section.items || []).map(renderArtist).join(' '); return `<div class="label">${esc(section.label || '')}</div><div class="line">${items}</div>`; }).join(''); const url = `index.html?event=${encodeURIComponent(getEventId(event))}`; return `<section class="event"><h2 class="event-title ${esc(event.color || 'olive')}"><a href="${url}">${formatEventDate(event.date)} ${esc(event.title)}</a></h2>${sections}<a class="more" href="${url}">more...</a></section>`; }
    function renderEvents(events){ if(!events.length){ document.getElementById('events').innerHTML = `<p class="no-events">Keine Veranstaltungen in ${MONTHS[activeMonth-1]} ${activeYear}.</p>`; return; } document.getElementById('events').innerHTML = events.map(renderEvent).join(''); }
    function renderDetail(event){ const image = event.imageUrl ? `<img class="event-hero" src="${esc(event.imageUrl)}" alt="${esc(event.title)}">` : ''; const sections = (event.sections || []).map(section => { const items = (section.items || []).map(renderArtist).join(' '); return `<div class="label">${esc(section.label || '')}</div><div class="line">${items}</div>`; }).join(''); const desc = event.description ? `<div class="event-description">${esc(event.description)}</div>` : ''; document.title = `Distillery – ${event.title}`; document.getElementById('events').innerHTML = `<a class="back-link" href="${showListUrl()}">back to dates</a>${image}<section class="event"><h2 class="event-title ${esc(event.color || 'olive')}">${formatEventDate(event.date)} ${esc(event.title)}</h2>${sections}${desc}</section>`; }
    function renderCalendar(events){ const first = new Date(activeYear, activeMonth-1, 1); const lastDay = new Date(activeYear, activeMonth, 0).getDate(); const offset = (first.getDay()+6)%7; const highlightMap = new Map(); events.forEach(event => { const date=parseEventDate(event.date); if(date && date.getFullYear()===activeYear && date.getMonth()+1===activeMonth){ const day=date.getDate(); if(!highlightMap.has(day)) highlightMap.set(day, []); highlightMap.get(day).push(event); } }); const rows=[]; let day=1; for(let week=0; week<6; week++){ const cells=[]; for(let weekday=0; weekday<7; weekday++){ if((week===0 && weekday<offset) || day>lastDay){ cells.push('<td></td>'); } else { const dayEvents=highlightMap.get(day)||[]; const color=dayEvents[0]?.color||''; const cls=color?` class="event-day day-${esc(color)}"`:''; const title=dayEvents.length?` title="${esc(dayEvents.map(event=>event.title).join(' / '))}"`:''; const dayText=String(day).padStart(2,'0'); const content=dayEvents.length?`<a href="index.html?event=${encodeURIComponent(getEventId(dayEvents[0]))}">${dayText}</a>`:dayText; cells.push(`<td${cls}${title}>${content}</td>`); day++; } } rows.push(`<tr>${cells.join('')}</tr>`); if(day>lastDay) break; } document.getElementById('calendar-body').innerHTML = rows.join(''); document.getElementById('month-label').textContent = `${MONTHS[activeMonth-1]} ${activeYear}`; document.getElementById('month-nav-label').textContent = `${MONTHS[activeMonth-1]} ${activeYear}`; }
    function renderCurrentMonth(){ const monthEvents = getMonthEvents(allEvents, activeYear, activeMonth).sort((a,b)=>String(a.date).localeCompare(String(b.date))); renderCalendar(allEvents); renderEvents(monthEvents); document.title='Distillery – Events'; }
    function renderSidebar(meta){ document.getElementById('highlight-title').textContent = meta.highlightTitle || ''; document.getElementById('highlight-links').innerHTML = (meta.highlightLinks || []).map(label => `<a class="side-link" href="#">${esc(label)}</a>`).join(''); }
    async function boot(){ try{ const response = await fetch(EVENTS_DATA_URL, { cache:'no-store' }); if(!response.ok) throw new Error(`${EVENTS_DATA_URL} konnte nicht geladen werden (${response.status})`); const data = await response.json(); const meta = data.meta || {}; allEvents = (data.events || []).filter(event => event.status !== 'archived').sort((a,b)=>String(a.date).localeCompare(String(b.date))); pickInitialMonth(allEvents, meta); renderSidebar(meta); renderCalendar(allEvents); const detailId = getCurrentEventId(); if(detailId){ const event = allEvents.find(e => getEventId(e) === detailId); if(event){ const d = parseEventDate(event.date); if(d){ activeYear=d.getFullYear(); activeMonth=d.getMonth()+1; renderCalendar(allEvents); } renderDetail(event); } else { document.getElementById('events').innerHTML = '<p class="error">Veranstaltung nicht gefunden.</p>'; } } else { renderCurrentMonth(); } document.getElementById('prev-month').addEventListener('click', () => changeMonth(-1)); document.getElementById('next-month').addEventListener('click', () => changeMonth(1)); }catch(error){ document.getElementById('events').innerHTML = `<p class="error">Fehler: ${esc(error.message)}</p>`; } }
    boot();
  </script>
