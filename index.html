<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Distillery – Events</title>
  <style>
    :root{--orange:#e49a78;--olive:#7b9ec8;--yellow:#e8cb7a;--grey:#d9d9d9}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;color:#000;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.12}a{color:inherit;text-decoration:none}.page{width:800px;min-height:100vh;display:grid;grid-template-columns:606px 194px;background:#fff}.main{padding:18px 58px 14px 30px;background:#fff}.sidebar{background:#000;color:#fff;padding:93px 14px 14px 24px;min-height:100vh}.logo{width:280px;height:78px;position:relative;margin:0 0 8px -35px;border-bottom:0;overflow:visible}.logo img{display:block;width:280px;height:78px;object-fit:contain}.nav{width:520px;margin-bottom:30px;font-size:13px;font-weight:900;text-transform:uppercase;line-height:1.13}.nav a{display:inline-block;padding:0 2px;margin:0 1px 3px 0;background:var(--grey);color:#000}.nav a:hover,.nav a.active{color:#fff;background:#000}.event{margin:0 0 18px 0;max-width:518px}.event-title{display:inline;padding:0 4px 0 0;font-size:18px;font-weight:900;line-height:1.02;letter-spacing:.2px;text-transform:uppercase}.event-title.olive{background:var(--olive)}.event-title.orange{background:var(--orange)}.event-title.yellow{background:var(--yellow)}.label{margin-top:3px}.line strong{font-size:16px;font-weight:900;letter-spacing:.2px}.artist-link:hover{background:#000;color:#fff}.more{display:inline-block;background:var(--grey);padding:0 3px;margin-top:1px;font-weight:700}.more:hover{background:#000;color:#fff}.event-hero{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;margin:0 0 14px}.event-description{margin-top:18px;max-width:435px;line-height:1.22;white-space:pre-wrap}.back-link{display:inline-block;background:var(--grey);font-weight:900;padding:0 3px;margin:0 0 14px}.back-link:hover{background:#000;color:#fff}.footer{margin-top:92px;font-size:11px;font-weight:900;text-transform:uppercase}.footer small{display:block;margin-top:4px;font-size:10px;font-weight:400;text-transform:none}.event-search{width:154px;margin:0 0 11px}.event-search label{display:block;margin-bottom:3px;font-size:11px;font-weight:900;text-transform:uppercase}.event-search-row{display:grid;grid-template-columns:minmax(0,1fr) 22px;gap:3px}.event-search input{width:100%;height:22px;border:0;border-radius:0;background:#fff;color:#000;padding:2px 4px;font:inherit;font-size:11px;outline:0}.event-search input:focus{outline:2px solid var(--yellow);outline-offset:0}.event-search button{height:22px;border:0;border-radius:0;background:#4b4b4b;color:#fff;padding:0;font:inherit;font-size:15px;font-weight:900;line-height:22px;cursor:pointer}.event-search button:hover{background:#fff;color:#000}.event-search-status{min-height:12px;margin-top:3px;color:#fff;font-size:10px;font-weight:900;text-transform:uppercase}.calendar-head{width:154px;display:grid;grid-template-columns:20px 1fr 20px;align-items:center;margin-bottom:4px;font-size:10px;font-weight:900;text-align:center}.calendar-head .cal-nav,.calendar-head .month{background:#4b4b4b;height:15px;line-height:15px;color:#fff}.calendar-head .cal-nav,.calendar-head .month{border:0;padding:0;font:inherit;font-weight:900;cursor:pointer}.calendar-head .month{margin:0 3px;text-transform:uppercase;white-space:nowrap;overflow:hidden;font-size:10px;letter-spacing:-.2px}.calendar-head .month:hover,.calendar-head .month:focus{background:#fff;color:#000;outline:0}.calendar{width:154px;border-collapse:collapse;margin-bottom:18px;color:#fff;font-size:13px;line-height:1}.calendar th,.calendar td{width:22px;height:18px;text-align:center;padding:0}.calendar th{font-size:11px;color:#fff}.calendar td.event-day{cursor:pointer;font-weight:900}.calendar td a{display:block;width:100%;height:18px;line-height:18px;color:inherit;text-decoration:none}.calendar .day-orange{background:#b38368;color:#000}.calendar .day-olive{background:var(--olive);color:#000}.calendar .day-yellow{background:var(--yellow);color:#000}.no-events{font-size:14px;font-weight:900;margin:0 0 18px}.side-block{margin-bottom:16px}.side-filter{display:block;width:max-content;max-width:155px;border:0;color:#000;padding:1px 2px;font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:900;text-align:left;text-transform:uppercase;margin:0 0 2px 0;cursor:pointer}.side-filter.orange{background:var(--orange)}.side-filter.olive{background:var(--olive)}.side-filter.yellow{background:var(--yellow)}.side-filter:hover,.side-filter.active{background:#000;color:#fff;outline:1px solid #fff}.resident-slideshow{width:154px;aspect-ratio:16/9;background:#111;margin-top:18px;position:relative;overflow:hidden}.resident-slideshow[hidden]{display:none}.resident-slideshow img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.5s ease}.resident-slideshow img.active{opacity:1}.resident-slideshow-empty{width:154px;aspect-ratio:16/9;display:grid;place-items:center;border:1px solid #333;color:#777;font-size:11px;font-weight:900;text-transform:uppercase;margin-top:18px}.month-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:20;display:grid;place-items:center}.month-picker-overlay[hidden]{display:none}.month-picker{width:270px;background:#fff;color:#000;border:4px solid #000;padding:14px}.month-picker h2{margin:0 0 12px;font-size:18px;text-transform:uppercase}.month-picker label{display:block;margin:0 0 4px;font-size:12px;font-weight:900;text-transform:uppercase}.month-picker select,.month-picker input{width:100%;border:2px solid #000;background:#fff;color:#000;font:inherit;padding:7px;margin-bottom:10px}.month-picker-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:4px}.month-picker button{border:2px solid #000;background:#ddd;color:#000;padding:7px 9px;font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:900;text-transform:uppercase;cursor:pointer}.month-picker button.primary{background:#000;color:#fff}.loading,.error{font-size:14px;font-weight:900}@media(max-width:820px){.page{width:100%;grid-template-columns:minmax(0,1fr)}.main{padding-right:24px}.sidebar{padding-top:24px;min-height:0}}
  </style>
</head>
<body>
  <div class="page">
    <main class="main">
      <header class="logo" aria-label="Distillery"><img src="assets/distillery-logo.png" alt="Distillery"></header>
      <nav class="nav" aria-label="Hauptnavigation"><a class="active" href="index.html">Dates</a><a href="news.html">News</a><a href="residents.html">Residents</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="history.html">History</a><a href="feedback.html">Feedback</a></nav>
      <div id="events"><p class="loading">Lade Veranstaltungen...</p></div>
      <footer class="footer">DISTILLERY | KURT-EISNER-STR. 108 A | 04275 LEIPZIG | TEL.: 0341/35597400<small>2001-2010 Distillery | <a href="#">LINKS</a> | <a href="#">Impressum</a> | <a href="#">Disclaimer</a></small></footer>
    </main>
    <aside class="sidebar">
      <div class="event-search">
        <label for="event-search-input">Search events:</label>
        <div class="event-search-row"><input id="event-search-input" type="search" autocomplete="off" placeholder="z. B. SUBMOD" aria-label="Alle Events durchsuchen"><button id="event-search-clear" type="button" aria-label="Suche löschen">×</button></div>
        <div class="event-search-status" id="event-search-status" aria-live="polite"></div>
      </div>
      <div class="calendar-head"><button class="cal-nav" id="prev-month" type="button">&lt;</button><button class="month" id="month-label" type="button" aria-haspopup="dialog">...</button><button class="cal-nav" id="next-month" type="button">&gt;</button></div>
      <table class="calendar" aria-label="Kalender"><thead><tr><th>MO</th><th>DI</th><th>MI</th><th>DO</th><th>FR</th><th>SA</th><th>SO</th></tr></thead><tbody id="calendar-body"></tbody></table>
      <div class="side-block" id="category-filters">
        <button class="side-filter orange" type="button" data-filter="orange">SATURDAY RAVE</button>
        <button class="side-filter olive" type="button" data-filter="olive">FRIDAY CLUB</button>
        <button class="side-filter yellow" type="button" data-filter="yellow">SPECIAL</button>
      </div>
      <div class="resident-slideshow" id="resident-slideshow" hidden aria-label="Resident Slideshow"></div>
    </aside>
  </div>

  <div class="month-picker-overlay" id="month-picker-overlay" hidden>
    <div class="month-picker" role="dialog" aria-modal="true" aria-labelledby="month-picker-title">
      <h2 id="month-picker-title">Monat wählen</h2>
      <label for="month-picker-month">Monat</label>
      <select id="month-picker-month"></select>
      <label for="month-picker-year">Jahr</label>
      <input id="month-picker-year" type="number" min="1992" max="2100" step="1">
      <div class="month-picker-actions"><button id="month-picker-cancel" type="button">Abbrechen</button><button class="primary" id="month-picker-apply" type="button">Anzeigen</button></div>
    </div>
  </div>

  <script>
    const EVENTS_DATA_URL = 'public/events/data/events.json';
    const RESIDENTS_DATA_URL = 'public/residents/data/residents.json';
    const WEEKDAYS = ['SO', 'MO', 'DI', 'MI', 'DO', 'FR', 'SA'];
    const MONTHS = ['JANUAR', 'FEBRUAR', 'MÄRZ', 'APRIL', 'MAI', 'JUNI', 'JULI', 'AUGUST', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DEZEMBER'];
    const CATEGORY_LABELS = { orange:'SATURDAY RAVE', olive:'FRIDAY CLUB', blue:'FRIDAY CLUB', yellow:'SPECIAL' };
    let allEvents = [];
    let activeYear = new Date().getFullYear();
    let activeMonth = new Date().getMonth() + 1;
    let activeFilter = null;
    let searchQuery = '';
    let residentSlides = [];
    let residentSlideIndex = 0;
    let residentSlideTimer = null;

    function esc(value){ return String(value ?? '').replace(/[&<>"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char])); }
    function slug(text){ return String(text||'event').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'event'; }
    function normalizeColor(color){ return color === 'blue' ? 'olive' : (color || 'olive'); }
    function getEventId(event){ return event.id || slug(`${event.date || ''} ${event.title || 'event'}`); }
    function parseEventDate(isoDate){ if(!isoDate) return null; const date = new Date(`${isoDate}T12:00:00`); return Number.isNaN(date.getTime()) ? null : date; }
    function formatEventDate(isoDate){ const date = parseEventDate(isoDate); if(!date) return ''; return `${WEEKDAYS[date.getDay()]}. ${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getFullYear()).slice(-2)}`; }
    function getMonthEvents(events, year, month){ return events.filter(event => { const date = parseEventDate(event.date); return date && date.getFullYear() === year && date.getMonth()+1 === month; }); }
    function getCurrentEventId(){ return new URLSearchParams(location.search).get('event'); }
    function normalizeSearchText(value){ return String(value ?? '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLocaleLowerCase('de'); }
    function eventSearchText(event){ return normalizeSearchText([event.title,event.description,event.moreUrl,...(event.sections||[]).flatMap(section=>[section.label,...(section.items||[]).flatMap(item=>[item.name,item.info,item.link])])].join(' ')); }
    function searchEvents(query){ const normalizedQuery=normalizeSearchText(query.trim()); if(!normalizedQuery)return []; return allEvents.filter(event=>eventSearchText(event).includes(normalizedQuery)).sort((a,b)=>String(b.date).localeCompare(String(a.date))||String(a.title).localeCompare(String(b.title),'de')); }
    function showListUrl(){ const params=new URLSearchParams(); if(searchQuery){ params.set('search',searchQuery); } else { params.set('month',`${activeYear}-${String(activeMonth).padStart(2,'0')}`); } return `index.html?${params.toString()}`; }
    function eventDetailUrl(event){ const params=new URLSearchParams(); params.set('event',getEventId(event)); if(searchQuery)params.set('search',searchQuery); return `index.html?${params.toString()}`; }
    function pickInitialMonth(events, meta){ const detailId=getCurrentEventId(); if(detailId){ const event=events.find(e=>getEventId(e)===detailId); const date=event?parseEventDate(event.date):null; if(date){ activeYear=date.getFullYear(); activeMonth=date.getMonth()+1; return; } } const fromUrl=new URLSearchParams(location.search).get('month'); if(/^\d{4}-\d{2}$/.test(fromUrl||'')){ const [y,m]=fromUrl.split('-').map(Number); activeYear=y; activeMonth=m; return; } const today=new Date(); activeYear=today.getFullYear(); activeMonth=today.getMonth()+1; }
    function changeMonth(direction){ const next=new Date(activeYear,activeMonth-1+direction,1); activeYear=next.getFullYear(); activeMonth=next.getMonth()+1; history.replaceState(null,'',showListUrl()); renderCurrentMonth(); }
    function setMonth(year, month){ activeYear=year; activeMonth=month; searchQuery=''; const input=document.getElementById('event-search-input'); if(input)input.value=''; history.replaceState(null,'',showListUrl()); renderCurrentMonth(); }
    function renderArtist(item){ const name=item.link?`<a class="artist-link" href="${esc(item.link)}" target="_blank" rel="noopener noreferrer"><strong>${esc(item.name)}</strong></a>`:`<strong>${esc(item.name)}</strong>`; const info=item.info?` (${esc(item.info)})`:''; return `<span class="artist">${name}${info}</span>`; }
    function renderEvent(event){ const color=normalizeColor(event.color); const sections=(event.sections||[]).map(section=>{ const items=(section.items||[]).map(renderArtist).join(' '); return `<div class="label">${esc(section.label||'')}</div><div class="line">${items}</div>`; }).join(''); const url=eventDetailUrl(event); return `<section class="event"><h2 class="event-title ${esc(color)}"><a href="${url}">${formatEventDate(event.date)} ${esc(event.title)}</a></h2>${sections}<a class="more" href="${url}">more...</a></section>`; }
    function renderEvents(events, emptyMessage=''){ if(!events.length){ const category=activeFilter?`${CATEGORY_LABELS[activeFilter]} `:''; document.getElementById('events').innerHTML=`<p class="no-events">${emptyMessage||`Keine ${category}Veranstaltungen in ${MONTHS[activeMonth-1]} ${activeYear}.`}</p>`; return; } document.getElementById('events').innerHTML=events.map(renderEvent).join(''); }
    function renderDetail(event){ const color=normalizeColor(event.color); const image=event.imageUrl?`<img class="event-hero" src="${esc(event.imageUrl)}" alt="${esc(event.title)}">`:''; const sections=(event.sections||[]).map(section=>{ const items=(section.items||[]).map(renderArtist).join(' '); return `<div class="label">${esc(section.label||'')}</div><div class="line">${items}</div>`; }).join(''); const desc=event.description?`<div class="event-description">${esc(event.description)}</div>`:''; document.title=`Distillery – ${event.title}`; document.getElementById('events').innerHTML=`<a class="back-link" href="${showListUrl()}">back to dates</a>${image}<section class="event"><h2 class="event-title ${esc(color)}">${formatEventDate(event.date)} ${esc(event.title)}</h2>${sections}${desc}</section>`; }
    function filteredEventsForMonth(){ const monthEvents=getMonthEvents(allEvents,activeYear,activeMonth).sort((a,b)=>String(a.date).localeCompare(String(b.date))); return activeFilter?monthEvents.filter(event=>normalizeColor(event.color)===activeFilter):monthEvents; }
    function renderCalendar(events){ const first=new Date(activeYear,activeMonth-1,1); const lastDay=new Date(activeYear,activeMonth,0).getDate(); const offset=(first.getDay()+6)%7; const highlightMap=new Map(); events.forEach(event=>{ const date=parseEventDate(event.date); if(date&&date.getFullYear()===activeYear&&date.getMonth()+1===activeMonth){ const day=date.getDate(); if(!highlightMap.has(day))highlightMap.set(day,[]); highlightMap.get(day).push(event); } }); const rows=[]; let day=1; for(let week=0;week<6;week++){ const cells=[]; for(let weekday=0;weekday<7;weekday++){ if((week===0&&weekday<offset)||day>lastDay){ cells.push('<td></td>'); } else { const dayEvents=highlightMap.get(day)||[]; const color=normalizeColor(dayEvents[0]?.color||''); const cls=dayEvents.length?` class="event-day day-${esc(color)}"`:''; const title=dayEvents.length?` title="${esc(dayEvents.map(event=>event.title).join(' / '))}"`:''; const dayText=String(day).padStart(2,'0'); const content=dayEvents.length?`<a href="${eventDetailUrl(dayEvents[0])}">${dayText}</a>`:dayText; cells.push(`<td${cls}${title}>${content}</td>`); day++; } } rows.push(`<tr>${cells.join('')}</tr>`); if(day>lastDay)break; } document.getElementById('calendar-body').innerHTML=rows.join(''); document.getElementById('month-label').textContent=`${MONTHS[activeMonth-1]} ${activeYear}`; }
    function renderFilterButtons(){ document.querySelectorAll('[data-filter]').forEach(button=>button.classList.toggle('active',button.dataset.filter===activeFilter)); }
    function updateSearchStatus(count=null){ const status=document.getElementById('event-search-status'); if(!searchQuery){ status.textContent=''; return; } status.textContent=`${count??searchEvents(searchQuery).length} TREFFER`; }
    function renderSearchResults(){ const matches=searchEvents(searchQuery); renderCalendar(getMonthEvents(allEvents,activeYear,activeMonth)); renderEvents(matches,`Keine Veranstaltungen für „${esc(searchQuery)}“ gefunden.`); renderFilterButtons(); updateSearchStatus(matches.length); document.title=`Distillery – Suche: ${searchQuery}`; }
    function renderCurrentMonth(){ if(searchQuery){ renderSearchResults(); return; } const visibleEvents=filteredEventsForMonth(); renderCalendar(visibleEvents); renderEvents(visibleEvents); renderFilterButtons(); updateSearchStatus(); document.title='Distillery – Events'; }
    function setSearchQuery(value, updateUrl=true){ searchQuery=String(value||'').trim(); const input=document.getElementById('event-search-input'); if(input.value!==searchQuery)input.value=searchQuery; activeFilter=null; if(updateUrl)history.replaceState(null,'',showListUrl()); renderCurrentMonth(); }
    function openMonthPicker(){ document.getElementById('month-picker-month').value=String(activeMonth); document.getElementById('month-picker-year').value=String(activeYear); document.getElementById('month-picker-overlay').hidden=false; document.getElementById('month-picker-month').focus(); }
    function closeMonthPicker(){ document.getElementById('month-picker-overlay').hidden=true; document.getElementById('month-label').focus(); }
    function setupMonthPicker(){ const monthSelect=document.getElementById('month-picker-month'); monthSelect.innerHTML=MONTHS.map((month,index)=>`<option value="${index+1}">${month}</option>`).join(''); document.getElementById('month-label').addEventListener('click',openMonthPicker); document.getElementById('month-picker-cancel').addEventListener('click',closeMonthPicker); document.getElementById('month-picker-apply').addEventListener('click',()=>{ const year=Number(document.getElementById('month-picker-year').value); const month=Number(document.getElementById('month-picker-month').value); if(year>=1992&&year<=2100&&month>=1&&month<=12){ closeMonthPicker(); setMonth(year,month); } }); document.getElementById('month-picker-overlay').addEventListener('click',event=>{ if(event.target.id==='month-picker-overlay')closeMonthPicker(); }); document.addEventListener('keydown',event=>{ if(event.key==='Escape'&&!document.getElementById('month-picker-overlay').hidden)closeMonthPicker(); }); }
    function renderSidebar(){ const input=document.getElementById('event-search-input'); const clearButton=document.getElementById('event-search-clear'); input.value=searchQuery; input.addEventListener('input',()=>setSearchQuery(input.value)); clearButton.addEventListener('click',()=>{ setSearchQuery(''); input.focus(); }); document.querySelectorAll('[data-filter]').forEach(button=>{ button.addEventListener('click',()=>{ if(searchQuery){ searchQuery=''; input.value=''; updateSearchStatus(); } activeFilter=activeFilter===button.dataset.filter?null:button.dataset.filter; history.replaceState(null,'',showListUrl()); renderCurrentMonth(); }); }); renderFilterButtons(); updateSearchStatus(); setupMonthPicker(); }
    function buildResidentSlides(residents){ const list=(residents||[]).filter(resident=>Array.isArray(resident.photos)&&resident.photos.length); const slides=[]; let photoIndex=0; let added=true; while(added){ added=false; list.forEach(resident=>{ const photo=resident.photos[photoIndex]; if(photo){ slides.push({src:photo,name:resident.name||'Resident'}); added=true; } }); photoIndex++; } return slides; }
    function startResidentSlideshow(){ const box=document.getElementById('resident-slideshow'); if(!box||!residentSlides.length)return; box.hidden=false; box.innerHTML='<img class="active" alt=""><img alt="">'; const imgs=box.querySelectorAll('img'); residentSlideIndex=0; imgs[0].src=residentSlides[0].src; imgs[0].alt=residentSlides[0].name; if(residentSlideTimer)clearInterval(residentSlideTimer); if(residentSlides.length<2)return; let activeLayer=0; residentSlideTimer=setInterval(()=>{ residentSlideIndex=(residentSlideIndex+1)%residentSlides.length; activeLayer=1-activeLayer; imgs[activeLayer].src=residentSlides[residentSlideIndex].src; imgs[activeLayer].alt=residentSlides[residentSlideIndex].name; imgs[activeLayer].classList.add('active'); imgs[1-activeLayer].classList.remove('active'); },4200); }
    async function initResidentSlideshow(){ try{ const response=await fetch(RESIDENTS_DATA_URL,{cache:'no-store'}); if(!response.ok)return; const data=await response.json(); residentSlides=buildResidentSlides(data.residents||[]); startResidentSlideshow(); }catch(error){} }
    async function boot(){ try{ initResidentSlideshow(); const response=await fetch(EVENTS_DATA_URL,{cache:'no-store'}); if(!response.ok)throw new Error(`${EVENTS_DATA_URL} konnte nicht geladen werden (${response.status})`); const data=await response.json(); const meta=data.meta||{}; allEvents=(data.events||[]).filter(event=>event.status!=='archived').sort((a,b)=>String(a.date).localeCompare(String(b.date))); searchQuery=(new URLSearchParams(location.search).get('search')||'').trim(); pickInitialMonth(allEvents,meta); renderSidebar(); const detailId=getCurrentEventId(); if(detailId){ const event=allEvents.find(e=>getEventId(e)===detailId); if(event){ renderCalendar([event]); renderDetail(event); updateSearchStatus(); } else { document.getElementById('events').innerHTML='<p class="error">Veranstaltung nicht gefunden.</p>'; } } else { renderCurrentMonth(); } document.getElementById('prev-month').addEventListener('click',()=>changeMonth(-1)); document.getElementById('next-month').addEventListener('click',()=>changeMonth(1)); }catch(error){ document.getElementById('events').innerHTML=`<p class="error">Fehler: ${esc(error.message)}</p>`; } }
    boot();
  </script>
</body>
</html>
