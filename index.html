<style>
:root{--orange:#e49a78;--olive:#7b9ec8;--yellow:#e8cb7a;--grey:#d9d9d9}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;color:#000;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.12}a{color:inherit;text-decoration:none}.page{width:800px;min-height:100vh;display:grid;grid-template-columns:606px 194px;background:#fff}.main{padding:18px 58px 14px 30px;background:#fff}.sidebar{background:#000;color:#fff;padding:93px 14px 14px 24px;min-height:100vh}.logo{width:280px;height:78px;margin:0 0 8px -35px}.logo img{display:block;width:280px;height:78px;object-fit:contain}.nav{width:520px;margin-bottom:30px;font-size:13px;font-weight:900;text-transform:uppercase;line-height:1.13}.nav a{display:inline-block;padding:0 2px;margin:0 1px 3px 0;background:var(--grey);color:#000}.nav a:hover,.nav a.active{color:#fff;background:#000}.event{margin:0 0 18px;max-width:518px}.event-title{display:inline;padding:0 4px 0 0;font-size:18px;font-weight:900;line-height:1.02;text-transform:uppercase}.event-title.olive{background:var(--olive)}.event-title.orange{background:var(--orange)}.event-title.yellow{background:var(--yellow)}.label{margin-top:3px}.line strong{font-size:16px;font-weight:900}.artist-link:hover{background:#000;color:#fff}.more,.back-link{display:inline-block;background:var(--grey);padding:0 3px;margin-top:1px;font-weight:700}.more:hover,.back-link:hover{background:#000;color:#fff}.event-hero{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;margin:0 0 14px}.event-description{margin-top:18px;max-width:435px;line-height:1.22;white-space:pre-wrap}.footer{margin-top:92px;font-size:11px;font-weight:900;text-transform:uppercase}.footer small{display:block;margin-top:4px;font-size:10px;font-weight:400;text-transform:none}.footer a:hover{background:#000;color:#fff}.event-search{width:154px;margin:0 0 11px}.event-search label{display:block;margin-bottom:3px;font-size:11px;font-weight:900;text-transform:uppercase}.event-search-row{display:grid;grid-template-columns:minmax(0,1fr) 22px;gap:3px}.event-search input{width:100%;height:22px;border:0;background:#fff;color:#000;padding:2px 4px;font:inherit;font-size:11px;outline:0}.event-search input:focus{outline:2px solid var(--yellow)}.event-search button{height:22px;border:0;background:#4b4b4b;color:#fff;padding:0;font:inherit;font-size:15px;font-weight:900;line-height:22px;cursor:pointer}.event-search-status{min-height:12px;margin-top:3px;color:#fff;font-size:10px;font-weight:900;text-transform:uppercase}.calendar-head{width:154px;display:grid;grid-template-columns:20px 1fr 20px;align-items:center;margin-bottom:4px;font-size:10px;font-weight:900;text-align:center}.calendar-head button{background:#4b4b4b;height:15px;line-height:15px;color:#fff;border:0;padding:0;font:inherit;font-weight:900;cursor:pointer}.calendar-head .month{margin:0 3px;text-transform:uppercase;white-space:nowrap;overflow:hidden;font-size:10px}.calendar-head button:hover,.calendar-head button:focus{background:#fff;color:#000;outline:0}.calendar{width:154px;border-collapse:collapse;margin-bottom:18px;color:#fff;font-size:13px;line-height:1}.calendar th,.calendar td{width:22px;height:18px;text-align:center;padding:0}.calendar th{font-size:11px}.calendar td.event-day{cursor:pointer;font-weight:900}.calendar td a{display:block;width:100%;height:18px;line-height:18px}.calendar .day-orange{background:#b38368;color:#000}.calendar .day-olive{background:var(--olive);color:#000}.calendar .day-yellow{background:var(--yellow);color:#000}.no-events,.loading,.error{font-size:14px;font-weight:900}.side-block{margin-bottom:16px}.side-filter{display:block;width:max-content;max-width:155px;border:0;color:#000;padding:1px 2px;font:inherit;font-size:13px;font-weight:900;text-align:left;text-transform:uppercase;margin:0 0 2px;cursor:pointer}.side-filter.orange{background:var(--orange)}.side-filter.olive{background:var(--olive)}.side-filter.yellow{background:var(--yellow)}.side-filter:hover,.side-filter.active{background:#000;color:#fff;outline:1px solid #fff}.resident-slideshow{width:154px;aspect-ratio:16/9;background:#111;margin-top:18px;position:relative;overflow:hidden}.resident-slideshow[hidden]{display:none}.resident-slideshow img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.5s ease}.resident-slideshow img.active{opacity:1}.month-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:20;display:grid;place-items:center}.month-picker-overlay[hidden]{display:none}.month-picker{width:270px;background:#fff;color:#000;border:4px solid #000;padding:14px}.month-picker h2{margin:0 0 12px;font-size:18px;text-transform:uppercase}.month-picker label{display:block;margin:0 0 4px;font-size:12px;font-weight:900;text-transform:uppercase}.month-picker select,.month-picker input{width:100%;border:2px solid #000;background:#fff;color:#000;font:inherit;padding:7px;margin-bottom:10px}.month-picker-actions{display:flex;gap:7px;justify-content:flex-end}.month-picker button{border:2px solid #000;background:#ddd;color:#000;padding:7px 9px;font:inherit;font-size:12px;font-weight:900;text-transform:uppercase;cursor:pointer}.month-picker button.primary{background:#000;color:#fff}@media(max-width:820px){.page{width:100%;grid-template-columns:1fr}.main{padding-right:24px}.sidebar{padding-top:24px;min-height:0}.nav{width:auto}}

<body>
<div class="page">
<main class="main">

<nav class="nav" aria-label="Hauptnavigation"><a class="active" href="index.html">Dates</a><a href="news.html">News</a><a href="residents.html">Residents</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="history.html">History</a><a href="feedback.html">Feedback</a></nav>

<footer class="footer">DISTILLERY LEIPZIG | EGGEBRECHTSTRAẞE 2 | 04103 LEIPZIG | <a href="mailto:club@distillery.de">club@distillery.de</a> | <a href="tel:+4934135597400">0341 35597400</a><small><a href="impressum.html">Impressum</a> · <a href="datenschutz.html">Datenschutz</a></small></footer>
</main>
<aside class="sidebar">
<div class="event-search"><label for="event-search-input">SEARCH:</label><div class="event-search-row"><input id="event-search-input" type="search" autocomplete="off" placeholder="Event, Artist, ..." aria-label="Alle Events durchsuchen"><button id="event-search-clear" type="button" aria-label="Suche löschen">×</button></div><div class="event-search-status" id="event-search-status" aria-live="polite"></div></div>
<div class="calendar-head"><button id="prev-month" type="button">&lt;</button><button class="month" id="month-label" type="button" aria-haspopup="dialog">...</button><button id="next-month" type="button">&gt;</button></div>
<table class="calendar" aria-label="Kalender"><thead><tr><th>MO</th><th>DI</th><th>MI</th><th>DO</th><th>FR</th><th>SA</th><th>SO</th></tr></thead><tbody id="calendar-body"></tbody></table>
<div class="side-block" id="category-filters"><button class="side-filter orange" type="button" data-filter="orange">SATURDAY RAVE</button><button class="side-filter olive" type="button" data-filter="olive">FRIDAY CLUB</button><button class="side-filter yellow" type="button" data-filter="yellow">SPECIAL</button></div>
<div class="resident-slideshow" id="resident-slideshow" hidden aria-label="Resident Slideshow"></div>
</aside>
</div>
<div class="month-picker-overlay" id="month-picker-overlay" hidden><div class="month-picker" role="dialog" aria-modal="true" aria-labelledby="month-picker-title"><h2 id="month-picker-title">Monat wählen</h2><label for="month-picker-month">Monat</label><select id="month-picker-month"></select><label for="month-picker-year">Jahr</label><input id="month-picker-year" type="number" min="1992" max="2100" step="1"><div class="month-picker-actions"><button id="month-picker-cancel" type="button">Abbrechen</button><button class="primary" id="month-picker-apply" type="button">Anzeigen</button></div></div></div>
<div aria-hidden="true" style="position:fixed;left:6px;bottom:6px;z-index:9999;background:#000;color:#fff;border:1px solid #fff;padding:3px 5px;font:10px/1.1 Arial,Helvetica,sans-serif;text-transform:uppercase;letter-spacing:.03em;opacity:.86;pointer-events:none">TEST BUILD<br>public-media-fix-4</div>
<script>
const EVENTS_DATA_URL='public/events/data/events.json',RESIDENTS_DATA_URL='public/residents/data/residents.json';
const WEEKDAYS=['SO','MO','DI','MI','DO','FR','SA'],MONTHS=['JANUAR','FEBRUAR','MÄRZ','APRIL','MAI','JUNI','JULI','AUGUST','SEPTEMBER','OKTOBER','NOVEMBER','DEZEMBER'];
const CATEGORY_LABELS={orange:'SATURDAY RAVE',olive:'FRIDAY CLUB',blue:'FRIDAY CLUB',yellow:'SPECIAL'};
let allEvents=[],activeYear=new Date().getFullYear(),activeMonth=new Date().getMonth()+1,activeFilter=null,searchQuery='',residentSlides=[],residentSlideIndex=0,residentSlideTimer=null;
function esc(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function slug(t){return String(t||'event').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'event'}
function normalizeColor(c){return c==='blue'?'olive':(c||'olive')}function getEventId(e){return e.id||slug(`${e.date||''} ${e.title||'event'}`)}
function parseEventDate(d){if(!d)return null;const x=new Date(`${d}T12:00:00`);return Number.isNaN(x.getTime())?null:x}
function formatEventDate(d){const x=parseEventDate(d);return x?`${WEEKDAYS[x.getDay()]}. ${String(x.getDate()).padStart(2,'0')}.${String(x.getMonth()+1).padStart(2,'0')}.${String(x.getFullYear()).slice(-2)}`:''}
function getMonthEvents(events,y,m){return events.filter(e=>{const d=parseEventDate(e.date);return d&&d.getFullYear()===y&&d.getMonth()+1===m})}
function normalizeSearchText(v){return String(v??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLocaleLowerCase('de')}
function eventSearchText(e){return normalizeSearchText([e.title,e.description,e.moreUrl,...(e.sections||[]).flatMap(s=>[s.label,...(s.items||[]).flatMap(i=>[i.name,i.info,i.link])])].join(' '))}
function searchEvents(q){const terms=normalizeSearchText(q).trim().split(/\s+/).filter(Boolean);if(!terms.length)return[];return allEvents.filter(e=>{const h=eventSearchText(e);return terms.every(t=>h.includes(t))}).sort((a,b)=>String(b.date).localeCompare(String(a.date))||String(a.title).localeCompare(String(b.title),'de'))}
function showListUrl(){const p=new URLSearchParams();if(searchQuery.trim())p.set('search',searchQuery.trim());else p.set('month',`${activeYear}-${String(activeMonth).padStart(2,'0')}`);return`index.html?${p}`}
function eventDetailUrl(e){const p=new URLSearchParams();p.set('event',getEventId(e));if(searchQuery.trim())p.set('search',searchQuery.trim());return`index.html?${p}`}
function renderArtist(i){const n=i.link?`<a class="artist-link" href="${esc(i.link)}" target="_blank" rel="noopener noreferrer"><strong>${esc(i.name)}</strong></a>`:`<strong>${esc(i.name)}</strong>`;return`<span class="artist">${n}${i.info?` (${esc(i.info)})`:''}</span>`}
function renderEvent(e){const c=normalizeColor(e.color),sections=(e.sections||[]).map(s=>`<div class="label">${esc(s.label||'')}</div><div class="line">${(s.items||[]).map(renderArtist).join(' ')}</div>`).join('');return`<section class="event"><h2 class="event-title ${esc(c)}"><a href="${eventDetailUrl(e)}">${formatEventDate(e.date)} ${esc(e.title)}</a></h2>${sections}<a class="more" href="${eventDetailUrl(e)}">more...</a></section>`}
function renderEvents(events,msg=''){if(!events.length){document.getElementById('events').innerHTML=`<p class="no-events">${msg||`Keine ${activeFilter?CATEGORY_LABELS[activeFilter]+' ':''}Veranstaltungen in ${MONTHS[activeMonth-1]} ${activeYear}.`}</p>`;return}document.getElementById('events').innerHTML=events.map(renderEvent).join('')}
function renderDetail(e){const c=normalizeColor(e.color),img=e.imageUrl?`<img class="event-hero" src="${esc(e.imageUrl)}" alt="${esc(e.title)}">`:'',sections=(e.sections||[]).map(s=>`<div class="label">${esc(s.label||'')}</div><div class="line">${(s.items||[]).map(renderArtist).join(' ')}</div>`).join(''),desc=e.description?`<div class="event-description">${esc(e.description)}</div>`:'';document.title=`Distillery – ${e.title}`;document.getElementById('events').innerHTML=`<a class="back-link" href="${showListUrl()}">back to dates</a>${img}<section class="event"><h2 class="event-title ${esc(c)}">${formatEventDate(e.date)} ${esc(e.title)}</h2>${sections}${desc}</section>`}
function filteredEventsForMonth(){const ev=getMonthEvents(allEvents,activeYear,activeMonth).sort((a,b)=>String(a.date).localeCompare(String(b.date)));return activeFilter?ev.filter(e=>normalizeColor(e.color)===activeFilter):ev}
function renderCalendar(events){const first=new Date(activeYear,activeMonth-1,1),lastDay=new Date(activeYear,activeMonth,0).getDate(),offset=(first.getDay()+6)%7,map=new Map();events.forEach(e=>{const d=parseEventDate(e.date);if(d&&d.getFullYear()===activeYear&&d.getMonth()+1===activeMonth){const day=d.getDate();if(!map.has(day))map.set(day,[]);map.get(day).push(e)}});let rows=[],day=1;for(let w=0;w<6;w++){let cells=[];for(let wd=0;wd<7;wd++){if((w===0&&wd<offset)||day>lastDay)cells.push('<td></td>');else{const ev=map.get(day)||[],c=normalizeColor(ev[0]?.color||''),txt=String(day).padStart(2,'0');cells.push(ev.length?`<td class="event-day day-${esc(c)}" title="${esc(ev.map(e=>e.title).join(' / '))}"><a href="${eventDetailUrl(ev[0])}">${txt}</a></td>`:`<td>${txt}</td>`);day++}}rows.push(`<tr>${cells.join('')}</tr>`);if(day>lastDay)break}document.getElementById('calendar-body').innerHTML=rows.join('');document.getElementById('month-label').textContent=`${MONTHS[activeMonth-1]} ${activeYear}`}
function renderFilterButtons(){document.querySelectorAll('[data-filter]').forEach(b=>b.classList.toggle('active',b.dataset.filter===activeFilter))}function updateSearchStatus(c=null){const s=document.getElementById('event-search-status');s.textContent=searchQuery.trim()?`${c??searchEvents(searchQuery).length} TREFFER`:''}
function renderCurrentMonth(){if(searchQuery.trim()){const m=searchEvents(searchQuery);renderCalendar(getMonthEvents(allEvents,activeYear,activeMonth));renderEvents(m,`Keine Veranstaltungen für „${esc(searchQuery.trim())}“ gefunden.`);updateSearchStatus(m.length);renderFilterButtons();return}const v=filteredEventsForMonth();renderCalendar(v);renderEvents(v);renderFilterButtons();updateSearchStatus();document.title='Distillery – Events'}
function setSearchQuery(v,u=true){searchQuery=String(v||'');const i=document.getElementById('event-search-input');if(i.value!==searchQuery)i.value=searchQuery;activeFilter=null;if(u)history.replaceState(null,'',showListUrl());renderCurrentMonth()}
function changeMonth(d){const n=new Date(activeYear,activeMonth-1+d,1);activeYear=n.getFullYear();activeMonth=n.getMonth()+1;history.replaceState(null,'',showListUrl());renderCurrentMonth()}
function setMonth(y,m){activeYear=y;activeMonth=m;searchQuery='';document.getElementById('event-search-input').value='';history.replaceState(null,'',showListUrl());renderCurrentMonth()}
function setupMonthPicker(){const ms=document.getElementById('month-picker-month');ms.innerHTML=MONTHS.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');const overlay=document.getElementById('month-picker-overlay');document.getElementById('month-label').onclick=()=>{ms.value=String(activeMonth);document.getElementById('month-picker-year').value=String(activeYear);overlay.hidden=false;ms.focus()};document.getElementById('month-picker-cancel').onclick=()=>overlay.hidden=true;document.getElementById('month-picker-apply').onclick=()=>{const y=Number(document.getElementById('month-picker-year').value),m=Number(ms.value);if(y>=1992&&y<=2100&&m>=1&&m<=12){overlay.hidden=true;setMonth(y,m)}};overlay.onclick=e=>{if(e.target===overlay)overlay.hidden=true};document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!overlay.hidden)overlay.hidden=true})}
function renderSidebar(){const i=document.getElementById('event-search-input'),x=document.getElementById('event-search-clear');i.value=searchQuery;i.oninput=()=>setSearchQuery(i.value);x.onclick=()=>{setSearchQuery('');i.focus()};document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{if(searchQuery.trim()){searchQuery='';i.value='';updateSearchStatus()}activeFilter=activeFilter===b.dataset.filter?null:b.dataset.filter;history.replaceState(null,'',showListUrl());renderCurrentMonth()});setupMonthPicker()}
function normalizeResidentPhotoPath(src){const value=String(src||'').trim();if(!value||/^(https?:|data:|blob:)/i.test(value))return value;if(value.startsWith('/Tille/public/'))return value.slice('/Tille/'.length);if(value.startsWith('/public/'))return value.slice(1);if(value.startsWith('/residents/media/'))return `public${value}`;if(value.startsWith('residents/media/'))return `public/${value}`;return value}
function residentPhotoSrc(value){let src='';if(!value)return'';if(typeof value==='string')src=value;else if(typeof value==='object')src=value.url||value.src||value.imageUrl||value.path||value.photoUrl||'';return normalizeResidentPhotoPath(src)}
function residentPhotoValues(r){if(Array.isArray(r.photoList)&&r.photoList.length)return r.photoList;if(Array.isArray(r.photos)&&r.photos.length)return r.photos;return[]}
function buildResidentSlides(residents){const list=(residents||[]).map(r=>({r,photos:residentPhotoValues(r)})).filter(item=>item.photos.length),slides=[];let idx=0,added=true;while(added){added=false;list.forEach(item=>{const src=residentPhotoSrc(item.photos[idx]);if(src){slides.push({src,name:item.r.name||'Resident'});added=true}});idx++}return slides}
function startResidentSlideshow(){const box=document.getElementById('resident-slideshow');if(!box||!residentSlides.length)return;box.hidden=false;box.innerHTML='<img class="active" alt=""><img alt="">';const imgs=box.querySelectorAll('img');residentSlideIndex=0;imgs[0].src=residentSlides[0].src;imgs[0].alt=residentSlides[0].name;if(residentSlideTimer)clearInterval(residentSlideTimer);if(residentSlides.length<2)return;let layer=0;residentSlideTimer=setInterval(()=>{residentSlideIndex=(residentSlideIndex+1)%residentSlides.length;layer=1-layer;imgs[layer].src=residentSlides[residentSlideIndex].src;imgs[layer].alt=residentSlides[residentSlideIndex].name;imgs[layer].classList.add('active');imgs[1-layer].classList.remove('active')},4200)}
function initResidentSlideshow(){fetch(RESIDENTS_DATA_URL,{cache:'no-store'}).then(r=>r.ok?r.json():null).then(d=>{if(!d)return;residentSlides=buildResidentSlides(d.residents||[]);startResidentSlideshow()}).catch(()=>{})}
async function boot(){try{initResidentSlideshow();const r=await fetch(EVENTS_DATA_URL,{cache:'no-store'});if(!r.ok)throw new Error(`${EVENTS_DATA_URL} konnte nicht geladen werden (${r.status})`);const d=await r.json();allEvents=(d.events||[]).filter(e=>e.status!=='archived').sort((a,b)=>String(a.date).localeCompare(String(b.date)));searchQuery=(new URLSearchParams(location.search).get('search')||'');const detail=new URLSearchParams(location.search).get('event'),fromUrl=new URLSearchParams(location.search).get('month');if(/^\d{4}-\d{2}$/.test(fromUrl||'')){const [y,m]=fromUrl.split('-').map(Number);activeYear=y;activeMonth=m}else if(detail){const e=allEvents.find(x=>getEventId(x)===detail),dt=e?parseEventDate(e.date):null;if(dt){activeYear=dt.getFullYear();activeMonth=dt.getMonth()+1}}renderSidebar();if(detail){const e=allEvents.find(x=>getEventId(x)===detail);if(e){renderCalendar([e]);renderDetail(e);updateSearchStatus()}else document.getElementById('events').innerHTML='<p class="error">Veranstaltung nicht gefunden.</p>'}else renderCurrentMonth();document.getElementById('prev-month').onclick=()=>changeMonth(-1);document.getElementById('next-month').onclick=()=>changeMonth(1)}catch(e){document.getElementById('events').innerHTML=`<p class="error">Fehler: ${esc(e.message)}</p>`}}
boot();
</script>
