server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    charset       utf-8;
    server_tokens off;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/xml application/javascript
                      application/json image/svg+xml application/manifest+json;

    add_header X-Content-Type-Options nosniff  always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # .webmanifest fehlt in der Standard-mime.types.
    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
        add_header Cache-Control          "no-cache" always;
    }

    # Inhaltsdaten: nie cachen, sonst zeigt die Seite alte Events/Residents.
    location ~* \.json$ {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
        add_header Cache-Control          "no-store" always;
    }

    # Medien und statische Assets: lange cachen.
    location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico|woff2?|mp4|webm)$ {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
        add_header Cache-Control          "public, max-age=2592000" always;
    }

    # HTML/CSS/JS: immer revalidieren, damit ein Deploy sofort sichtbar ist.
    location ~* \.(?:html|css|js)$ {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
        add_header Cache-Control          "no-cache" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
