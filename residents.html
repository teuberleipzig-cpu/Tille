<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Distillery – Residents</title>
  <style>
    :root{--grey:#d9d9d9;--orange:#e49a78}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;color:#000;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.15}a{color:inherit;text-decoration:none}.page{width:800px;min-height:100vh;display:grid;grid-template-columns:606px 194px;background:#fff}.main{padding:18px 58px 14px 30px;background:#fff}.sidebar{background:#000;color:#777;padding:93px 14px 14px 24px;min-height:100vh}.logo{width:280px;height:78px;margin:0 0 8px -35px;display:flex;align-items:center}.logo-word{font-size:31px;font-weight:900;font-style:italic;letter-spacing:-2px;line-height:1;transform:skew(-8deg)}.nav{width:378px;margin-bottom:30px;font-size:13px;font-weight:900;text-transform:uppercase;line-height:1.13}.nav a{display:inline-block;padding:0 2px;margin:0 1px 3px 0;background:var(--grey);color:#000}.nav a:hover,.nav a.active{color:#fff;background:#000}.resident-list-title{display:block;margin:0 0 8px;color:#fff;font-weight:900;text-transform:uppercase}.resident-link{display:block;width:max-content;max-width:155px;color:#777;text-transform:uppercase;font-size:12px;line-height:1.35;font-weight:900}.resident-link:hover,.resident-link.active{color:#fff}.empty{min-height:700px}.hero{width:100%;aspect-ratio:16/9;background:#eee;object-fit:cover;display:block;margin:0 0 14px}.resident-title{display:inline;background:var(--orange);padding:0 3px;font-size:20px;font-weight:900;text-transform:uppercase}.profile-grid{display:grid;grid-template-columns:210px 1fr;gap:28px;margin-top:14px;max-width:520px}.facts{font-size:12px}.fact{display:grid;grid-template-columns:86px 1fr;margin-bottom:3px}.fact b{font-weight:900}.actions{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}.button{display:inline-block;background:var(--grey);border:0;padding:5px 8px;font-weight:900;text-transform:uppercase;color:#000}.button:hover{background:#000;color:#fff}.socials{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}.socials a{background:var(--grey);padding:2px 4px;font-weight:900;text-transform:uppercase}.socials a:hover{background:#000;color:#fff}.textblock{white-space:pre-wrap;line-height:1.22}.section-title{display:inline-block;background:#000;color:#fff;padding:1px 3px;margin:20px 0 7px;font-weight:900;text-transform:uppercase}.embeds{margin-top:16px}.embed-item{margin-bottom:12px;max-width:520px}.embed-item iframe{max-width:100%}.slide-controls{display:flex;gap:6px;margin:-6px 0 12px}.slide-controls button{border:0;background:#d9d9d9;font-weight:900;cursor:pointer}.slide-controls button:hover{background:#000;color:#fff}.footer{margin-top:92px;font-size:11px;font-weight:900;text-transform:uppercase}.footer small{display:block;margin-top:4px;font-size:10px;font-weight:400;text-transform:none}.loading,.error{font-weight:900}@media(max-width:820px){.page{width:100%;grid-template-columns:1fr}.sidebar{padding-top:20px;min-height:0}.profile-grid{grid-template-columns:1fr}.main{padding-right:24px}}
  </style>
</head>
<body>
<div class="page">
  <main class="main">
    <header class="logo"><div class="logo-word">Distillery<span style="font-size:8px;vertical-align:top;margin-left:3px;font-style:normal;letter-spacing:0">TM</span></div></header>
    <nav class="nav"><a href="index.html">Dates</a><a href="news.html">News</a><a class="active" href="residents.html">Residents</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav>
    <div id="content"><p class="loading">Lade Residents...</p></div>
    <footer class="footer">DISTILLERY | KURT-EISNER-STR. 108 A | 04275 LEIPZIG | TEL.: 0341/35597400<small>2001-2010 Distillery | LINKS | Impressum | Disclaimer</small></footer>
  </main>
  <aside class="sidebar"><span class="resident-list-title">Residents</span><div id="resident-list"></div></aside>
</div>
<script>
const DATA_URL='public/residents/data/residents.json';
let residents=[];let slideIndex=0;let timer=null;
const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slug=t=>String(t||'resident').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'resident';
const rid=r=>r.id||slug(r.name);
function selectedId(){return new URLSearchParams(location.search).get('resident');}
function renderList(){const id=selectedId();document.getElementById('resident-list').innerHTML=residents.map(r=>`<a class="resident-link ${rid(r)===id?'active':''}" href="residents.html?resident=${encodeURIComponent(rid(r))}">${esc(r.name)}</a>`).join('')||'<span class="resident-link">Noch keine Residents</span>';}
function link(label,url){return url?`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${label}</a>`:'';}
function fact(label,value){return value?`<div class="fact"><b>${label}</b><span>${esc(value)}</span></div>`:'';}
function currentPhoto(r){const photos=r.photos||[];return photos.length?photos[slideIndex%photos.length]:'';}
function renderHero(r){const img=currentPhoto(r);if(!img)return '<div class="hero"></div>';return `<img class="hero" src="${esc(img)}" alt="${esc(r.name)}">`}
function renderEmbeds(r){const codes=(r.embeds||'').trim();if(!codes)return '';return `<div class="section-title">Media</div><div class="embeds"><div class="embed-item">${codes}</div></div>`;}
function renderResident(r){slideIndex=0;document.title='Distillery – '+r.name;const socials=[link('Instagram',r.instagram),link('RA',r.residentadvisor),link('Discogs',r.discogs),link('Beatport',r.beatport),link('Bandcamp',r.bandcamp),link('Soundcloud',r.soundcloud)].filter(Boolean).join('');const press=r.presskit?`<a class="button" href="${esc(r.presskit)}" download="${esc(slug(r.name))}-presskit.zip">Download Presskit</a>`:'';const book=r.bookingEmail?`<a class="button" href="mailto:${esc(r.bookingEmail)}">Book Artist</a>`:'';document.getElementById('content').innerHTML=`${renderHero(r)}<div class="slide-controls">${(r.photos||[]).length>1?'<button id="prev-slide">&lt;</button><button id="next-slide">&gt;</button>':''}</div><h1 class="resident-title">${esc(r.name)}</h1><div class="profile-grid"><div><div class="facts">${fact('Labels',r.labels)}${fact('Projects',r.relatedProjects)}</div><div class="socials">${socials}</div><div class="actions">${press}${book}</div></div><div><div class="section-title">Pressetext</div><div class="textblock">${esc(r.pressText||'')}</div>${r.news?`<div class="section-title">News</div><div class="textblock">${esc(r.news)}</div>`:''}</div></div>${renderEmbeds(r)}`;if((r.photos||[]).length>1){document.getElementById('prev-slide').onclick=()=>{slideIndex=(slideIndex+r.photos.length-1)%r.photos.length;renderResident(r)};document.getElementById('next-slide').onclick=()=>{slideIndex=(slideIndex+1)%r.photos.length;renderResident(r)};clearInterval(timer);timer=setInterval(()=>{slideIndex=(slideIndex+1)%r.photos.length;const hero=document.querySelector('.hero');if(hero&&hero.tagName==='IMG')hero.src=currentPhoto(r);},4500);}}
async function boot(){try{const res=await fetch(DATA_URL,{cache:'no-store'});if(!res.ok)throw new Error('Residents konnten nicht geladen werden.');const data=await res.json();residents=(data.residents||[]).sort((a,b)=>String(a.name).localeCompare(String(b.name)));renderList();const id=selectedId();if(id){const r=residents.find(x=>rid(x)===id);r?renderResident(r):document.getElementById('content').innerHTML='<p class="error">Resident nicht gefunden.</p>';}else{document.getElementById('content').innerHTML='<div class="empty"></div>';}}catch(e){document.getElementById('content').innerHTML=`<p class="error">${esc(e.message)}</p>`;}}
boot();
</script>
</body></html>
