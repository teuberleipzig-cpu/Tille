  <style>
    :root{--grey:#d9d9d9;--orange:#e49a78}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;color:#000;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.15}a{color:inherit;text-decoration:none}.page{width:800px;min-height:100vh;display:grid;grid-template-columns:606px 194px;background:#fff}.main{padding:18px 58px 14px 30px;background:#fff}.sidebar{background:#000;color:#777;padding:93px 14px 14px 24px;min-height:100vh}.logo{width:280px;height:78px;position:relative;margin:0 0 8px -35px;border-bottom:0;overflow:visible}.logo img{display:block;width:280px;height:78px;object-fit:contain}.nav{width:520px;margin-bottom:30px;font-size:13px;font-weight:900;text-transform:uppercase;line-height:1.13}.nav a{display:inline-block;padding:0 2px;margin:0 1px 3px 0;background:var(--grey);color:#000}.nav a:hover,.nav a.active{color:#fff;background:#000}.resident-list-title{display:block;margin:0 0 8px;color:#fff;font-weight:900;text-transform:uppercase}.resident-link{display:block;width:max-content;max-width:155px;color:#777;text-transform:uppercase;font-size:12px;line-height:1.35;font-weight:900}.resident-link:hover,.resident-link.active{color:#fff}.empty{min-height:700px}.hero-slider{width:100%;aspect-ratio:16/9;background:#eee;position:relative;overflow:hidden;margin:0 0 22px}.hero-slider img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 2s ease}.hero-slider img.active{opacity:1}.hero-placeholder{display:grid;place-items:center;width:100%;aspect-ratio:16/9;background:#eee;color:#777;font-size:24px;margin:0 0 22px;text-transform:uppercase;letter-spacing:.5px}.profile-column{max-width:520px;margin:0}.resident-title{display:block;width:100%;background:var(--orange);padding:2px 4px;font-size:20px;line-height:1.05;font-weight:900;text-transform:uppercase;margin:0 0 12px}.facts{font-size:12px;margin:0 0 11px}.fact{display:grid;grid-template-columns:74px 1fr;margin-bottom:3px}.fact b{font-weight:900}.socials{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 13px}.social-icon{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--grey);padding:3px}.social-icon:hover{background:#000}.social-icon img{width:16px;height:16px;display:block;filter:grayscale(1) brightness(0) contrast(2)}.social-icon:hover img{filter:grayscale(1) brightness(0) invert(1) contrast(2)}.actions{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 22px}.button{display:inline-block;background:var(--grey);border:0;padding:5px 8px;font-weight:900;text-transform:uppercase;color:#000}.button:hover{background:#000;color:#fff}.textblock{white-space:pre-wrap;line-height:1.24}.section-title{display:inline-block;background:#000;color:#fff;padding:1px 3px;margin:0 0 7px;font-weight:900;text-transform:uppercase}.news-title{margin-top:20px}.news-list{display:grid;gap:4px;margin:2px 0 10px}.news-entry{display:grid;grid-template-columns:78px minmax(0,1fr);gap:8px;align-items:start;max-width:100%}.news-entry time{display:block;background:transparent;color:#555;font-weight:900;padding:0;margin:0;white-space:nowrap;text-decoration:none}.news-entry .textblock{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.15}.past-news-toggle{margin:1px 0 7px;padding:0;background:transparent;color:#777;font-size:10px;font-weight:400;line-height:1.1;text-transform:uppercase}.past-news-toggle:hover{background:transparent;color:#555}.past-news[hidden]{display:none}.release-section{max-width:520px;margin-top:22px}.release-table{display:grid;gap:0;margin:2px 0 10px;border-top:1px solid #ddd}.release-row{display:grid;grid-template-columns:54px minmax(90px,1fr) 94px 38px 78px 106px;gap:9px;align-items:center;border-bottom:1px solid #ddd;padding:6px 0;cursor:pointer}.release-row:hover{background:#f7f7f7}.release-cover{width:54px;height:54px;background:#eee;border:1px solid #ddd;overflow:hidden}.release-cover img{display:block;width:100%;height:100%;object-fit:cover}.release-cover-placeholder{display:grid;place-items:center;width:100%;height:100%;font-size:9px;color:#777;text-transform:uppercase}.release-name{font-weight:900;line-height:1.15}.release-label,.release-year,.release-format{line-height:1.15;color:#222}.release-links{line-height:1.25}.release-links a,.release-more,.all-releases-link{color:#04f;text-decoration:none}.release-links a:hover,.release-more:hover,.all-releases-link:hover{text-decoration:underline}.release-more{display:block;border:0;background:transparent;padding:2px 0 0;font:inherit;font-size:10px;cursor:pointer;text-align:left;text-transform:uppercase}.release-details{grid-column:2 / -1;padding:5px 0 8px;color:#222;line-height:1.25;cursor:default}.release-details[hidden]{display:none}.release-detail-grid{display:grid;grid-template-columns:82px 1fr;gap:3px 8px}.release-detail-grid b{font-weight:900}.release-tracks{margin:4px 0 0;padding-left:15px}.release-tracks li{margin:0 0 2px}.all-releases-link{display:inline-block;margin-top:2px;font-size:11px;font-weight:900;text-transform:uppercase}.media-section{max-width:520px;margin-top:24px}.media-section .section-title{margin-bottom:10px}.embed-item{margin-bottom:12px;width:100%;overflow:hidden}.embed-item iframe{max-width:100%;display:block}.embed-empty{min-height:320px;background:#f3f3f3}.footer{margin-top:92px;font-size:11px;font-weight:900;text-transform:uppercase}.footer small{display:block;margin-top:4px;font-size:10px;font-weight:400;text-transform:none}.loading,.error{font-weight:900}@media(max-width:820px){.page{width:100%;grid-template-columns:1fr}.sidebar{padding-top:20px;min-height:0}.main{padding-right:24px}.profile-column,.media-section,.release-section{max-width:100%}.release-row{grid-template-columns:50px 1fr;gap:8px}.release-label,.release-year,.release-format,.release-links{grid-column:2}.release-details{grid-column:1 / -1}}

<script>
const DATA_URL='public/residents/data/residents.json';
const RELEASE_PREVIEW_LIMIT=5;
let residents=[];let timer=null;let activeResidentId='';let activeSlide=0;let activeLayer=0;
const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slug=t=>String(t||'resident').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'resident';
const rid=r=>r.id||slug(r.name);
function selectedId(){return new URLSearchParams(location.search).get('resident');}
function todayIso(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10);}
function renderList(){const id=activeResidentId||selectedId();document.getElementById('resident-list').innerHTML=residents.map(r=>`<a class="resident-link ${rid(r)===id?'active':''}" href="residents.html?resident=${encodeURIComponent(rid(r))}">${esc(r.name)}</a>`).join('')||'<span class="resident-link">Noch keine Residents</span>';}
function fact(label,value){return value?`<div class="fact"><b>${label}</b><span>${esc(value)}</span></div>`:'';}
function favicon(domain){return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=32`;}
function socialIcon(label,url,domain){return url?`<a class="social-icon" href="${esc(url)}" target="_blank" rel="noopener noreferrer" title="${esc(label)}"><img src="${favicon(domain)}" alt="${esc(label)}"></a>`:'';}
function renderSocials(r){return [socialIcon('Instagram',r.instagram,'instagram.com'),socialIcon('Resident Advisor',r.residentadvisor,'ra.co'),socialIcon('Discogs',r.discogs,'discogs.com'),socialIcon('Beatport',r.beatport,'beatport.com'),socialIcon('Bandcamp',r.bandcamp,'bandcamp.com'),socialIcon('SoundCloud',r.soundcloud,'soundcloud.com')].filter(Boolean).join('');}
function renderHero(r){const photos=r.photos||[];if(!photos.length)return '<div class="hero-placeholder">Bilder-Slide</div>';return `<div class="hero-slider" id="hero-slider"><img class="active" src="${esc(photos[0])}" alt="${esc(r.name)}"><img src="${esc(photos[1]||photos[0])}" alt="${esc(r.name)}"></div>`;}
function setupSlider(r){clearInterval(timer);const photos=r.photos||[];activeSlide=0;activeLayer=0;if(photos.length<2)return;timer=setInterval(()=>{activeSlide=(activeSlide+1)%photos.length;activeLayer=1-activeLayer;const imgs=document.querySelectorAll('#hero-slider img');if(imgs.length<2)return;imgs[activeLayer].src=photos[activeSlide];imgs[activeLayer].classList.add('active');imgs[1-activeLayer].classList.remove('active');},4500);}
function renderEmbeds(r){const codes=(r.embeds||'').trim();if(!codes)return '';return `<section class="media-section"><div class="section-title">Media</div><div class="embeds"><div class="embed-item">${codes}</div></div></section>`;}
function formatNewsDate(date){if(!date)return '';const [year,month,day]=String(date).split('-');return year&&month&&day?`${day}.${month}.${year}`:esc(date);}
function arr(v){return Array.isArray(v)?v.filter(Boolean):String(v||'').split(/\n|,/).map(x=>x.trim()).filter(Boolean);}
function publishedReleases(r){return (r.releases||[]).filter(rel=>rel&&rel.published!==false&&(rel.title||rel.releaseDate||rel.label)).sort((a,b)=>(Number(!!b.featured)-Number(!!a.featured))||String(b.releaseDate||b.year||'').localeCompare(String(a.releaseDate||a.year||''))||String(a.title||'').localeCompare(String(b.title||''),'de'));}
function releaseYear(rel){return rel.year||String(rel.releaseDate||'').slice(0,4)||'';}
function releaseFormat(rel){return [rel.releaseType,rel.format].filter(Boolean).join(' · ');}
function renderReleaseNews(r){return publishedReleases(r).filter(rel=>rel.autoNews!==false&&rel.releaseDate&&rel.title).map(rel=>({date:rel.releaseDate,text:rel.autoNewsText||`${rel.title} Release`,source:'release',id:rel.id||slug(rel.title)}));}
function renderNewsEntry(item){return `<article class="news-entry"><time datetime="${esc(item.date)}">${formatNewsDate(item.date)}</time><div class="textblock" title="${esc(item.text)}">${esc(item.text)}</div></article>`;}
function splitNewsItems(r){const today=todayIso();const manual=(r.newsItems||[]).filter(item=>item&&item.date&&String(item.text||'').trim());const items=[...manual,...renderReleaseNews(r)].sort((a,b)=>String(a.date).localeCompare(String(b.date))||String(a.text).localeCompare(String(b.text),'de'));return{upcoming:items.filter(item=>String(item.date)>=today),past:items.filter(item=>String(item.date)<today).sort((a,b)=>String(b.date).localeCompare(String(a.date))||String(a.text).localeCompare(String(b.text),'de'))};}
function renderNews(r){const {upcoming,past}=splitNewsItems(r);if(!upcoming.length&&!past.length){return r.news?`<div class="section-title news-title">News</div><div class="textblock">${esc(r.news)}</div>`:'';}const upcomingHtml=upcoming.length?`<div class="news-list">${upcoming.map(renderNewsEntry).join('')}</div>`:'<div class="textblock">Keine aktuellen News.</div>';const pastId=`past-news-${rid(r)}`;const pastHtml=past.length?`<button class="button past-news-toggle" type="button" data-past-news-toggle aria-expanded="false" aria-controls="${esc(pastId)}">Vergangene News</button><div class="past-news" id="${esc(pastId)}" hidden><div class="news-list">${past.map(renderNewsEntry).join('')}</div></div>`:'';return `<div class="section-title news-title">News</div>${upcomingHtml}${pastHtml}`;}
function releaseLinks(rel){return [['Discogs',rel.discogsUrl],['Beatport',rel.beatportUrl],['Bandcamp',rel.bandcampUrl],['Label',rel.labelUrl]].filter(x=>x[1]).map(([label,url])=>`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`).join(' / ');}
function coverHtml(rel){return rel.coverImage?`<img src="${esc(rel.coverImage)}" alt="${esc(rel.title||'Release Cover')}">`:'<div class="release-cover-placeholder">Cover</div>';}
function releaseDetails(rel){const artists=arr(rel.artists).join(', ');const tracks=arr(rel.tracks);const details=[['Releasedatum',rel.releaseDate?formatNewsDate(rel.releaseDate):''],['Artist(s)',artists],['Land',rel.country],['Art',rel.releaseType],['Format',rel.format],['Label',rel.label]].filter(x=>x[1]);const trackHtml=tracks.length?`<b>Tracks</b><ol class="release-tracks">${tracks.map(t=>`<li>${esc(t)}</li>`).join('')}</ol>`:'';const desc=rel.description?`<div class="release-detail-grid"><b>Info</b><span>${esc(rel.description)}</span></div>`:'';return `<div class="release-details" hidden><div class="release-detail-grid">${details.map(([k,v])=>`<b>${esc(k)}</b><span>${esc(v)}</span>`).join('')}</div>${trackHtml}${desc}</div>`;}
function renderReleaseRow(rel){const links=releaseLinks(rel);return `<article class="release-row" data-release-row><div class="release-cover">${coverHtml(rel)}</div><div class="release-name">${esc(rel.title||'Ohne Titel')}</div><div class="release-label">${esc(rel.label||'')}</div><div class="release-year">${esc(releaseYear(rel))}</div><div class="release-format">${esc(releaseFormat(rel))}</div><div class="release-links">${links||''}<button class="release-more" type="button" data-release-more>Mehr Infos</button></div>${releaseDetails(rel)}</article>`;}
function renderReleases(r){const releases=publishedReleases(r);if(!releases.length)return '';const preview=releases.slice(0,RELEASE_PREVIEW_LIMIT);const allLink=releases.length>RELEASE_PREVIEW_LIMIT?`<a class="all-releases-link" href="resident-releases.html?resident=${encodeURIComponent(rid(r))}">Alle Releases</a>`:'';return `<section class="release-section"><div class="section-title">Releases</div><div class="release-table">${preview.map(renderReleaseRow).join('')}</div>${allLink}</section>`;}
function bindReleaseToggles(){document.querySelectorAll('[data-release-row]').forEach(row=>{row.addEventListener('click',e=>{if(e.target.closest('a'))return;const details=row.querySelector('.release-details');const button=row.querySelector('[data-release-more]');if(!details)return;const open=details.hasAttribute('hidden');details.toggleAttribute('hidden',!open);if(button)button.textContent=open?'Weniger Infos':'Mehr Infos';});});}
function bindPastNewsToggle(){const button=document.querySelector('[data-past-news-toggle]');if(!button)return;const target=document.getElementById(button.getAttribute('aria-controls'));if(!target)return;button.addEventListener('click',()=>{const open=target.hasAttribute('hidden');target.toggleAttribute('hidden',!open);button.setAttribute('aria-expanded',String(open));button.textContent=open?'Ausblenden':'Vergangene News';});}
function renderResident(r){activeResidentId=rid(r);renderList();document.title='Distillery – '+r.name;const socials=renderSocials(r);const press=r.presskit?`<a class="button" href="${esc(r.presskit)}" download="${esc(slug(r.name))}-presskit.zip">Download Presskit</a>`:'';const book=r.bookingEmail?`<a class="button" href="mailto:${esc(r.bookingEmail)}">Book Artist</a>`:'';const facts=`${fact('City',r.city)}${fact('Genre',r.genre)}${fact('Labels',r.labels)}${fact('Projects',r.relatedProjects)}`;document.getElementById('content').innerHTML=`${renderHero(r)}<section class="profile-column"><h1 class="resident-title">${esc(r.name)}</h1><div class="facts">${facts}</div><div class="socials">${socials}</div><div class="actions">${press}${book}</div><div class="section-title">Pressetext</div><div class="textblock">${esc(r.pressText||'')}</div>${renderNews(r)}${renderReleases(r)}</section>${renderEmbeds(r)}`;bindPastNewsToggle();bindReleaseToggles();setupSlider(r);}
async function boot(){try{const res=await fetch(DATA_URL,{cache:'no-store'});if(!res.ok)throw new Error('Residents konnten nicht geladen werden.');const data=await res.json();residents=(data.residents||[]).sort((a,b)=>String(a.name).localeCompare(String(b.name)));const urlId=selectedId();let resident=urlId?residents.find(x=>rid(x)===urlId):residents[0];if(resident&&!urlId){history.replaceState(null,'',`residents.html?resident=${encodeURIComponent(rid(resident))}`);}activeResidentId=resident?rid(resident):'';renderList();if(resident){renderResident(resident);}else{document.getElementById('content').innerHTML='<div class="empty"></div>';}}catch(e){document.getElementById('content').innerHTML=`<p class="error">${esc(e.message)}</p>`;}}
boot();
</script>
