<script>
const DATA_URL='public/residents/data/residents.json';
let residents=[];let slideIndex=0;let timer=null;let activeResidentId='';
const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slug=t=>String(t||'resident').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'resident';
const rid=r=>r.id||slug(r.name);
function selectedId(){return new URLSearchParams(location.search).get('resident');}
function renderList(){const id=activeResidentId||selectedId();document.getElementById('resident-list').innerHTML=residents.map(r=>`<a class="resident-link ${rid(r)===id?'active':''}" href="residents.html?resident=${encodeURIComponent(rid(r))}">${esc(r.name)}</a>`).join('')||'<span class="resident-link">Noch keine Residents</span>';}
function link(label,url){return url?`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${label}</a>`:'';}
function fact(label,value){return value?`<div class="fact"><b>${label}</b><span>${esc(value)}</span></div>`:'';}
function currentPhoto(r){const photos=r.photos||[];return photos.length?photos[slideIndex%photos.length]:'';}
function renderHero(r){const img=currentPhoto(r);if(!img)return '<div class="hero"></div>';return `<img class="hero" src="${esc(img)}" alt="${esc(r.name)}">`}
function renderEmbeds(r){const codes=(r.embeds||'').trim();if(!codes)return '';return `<div class="section-title">Media</div><div class="embeds"><div class="embed-item">${codes}</div></div>`;}
function renderResident(r){activeResidentId=rid(r);renderList();slideIndex=0;document.title='Distillery – '+r.name;const socials=[link('Instagram',r.instagram),link('RA',r.residentadvisor),link('Discogs',r.discogs),link('Beatport',r.beatport),link('Bandcamp',r.bandcamp),link('Soundcloud',r.soundcloud)].filter(Boolean).join('');const press=r.presskit?`<a class="button" href="${esc(r.presskit)}" download="${esc(slug(r.name))}-presskit.zip">Download Presskit</a>`:'';const book=r.bookingEmail?`<a class="button" href="mailto:${esc(r.bookingEmail)}">Book Artist</a>`:'';document.getElementById('content').innerHTML=`${renderHero(r)}<div class="slide-controls">${(r.photos||[]).length>1?'<button id="prev-slide">&lt;</button><button id="next-slide">&gt;</button>':''}</div><h1 class="resident-title">${esc(r.name)}</h1><div class="profile-grid"><div><div class="facts">${fact('Labels',r.labels)}${fact('Projects',r.relatedProjects)}</div><div class="socials">${socials}</div><div class="actions">${press}${book}</div></div><div><div class="section-title">Pressetext</div><div class="textblock">${esc(r.pressText||'')}</div>${r.news?`<div class="section-title">News</div><div class="textblock">${esc(r.news)}</div>`:''}</div></div>${renderEmbeds(r)}`;if((r.photos||[]).length>1){document.getElementById('prev-slide').onclick=()=>{slideIndex=(slideIndex+r.photos.length-1)%r.photos.length;renderResident(r)};document.getElementById('next-slide').onclick=()=>{slideIndex=(slideIndex+1)%r.photos.length;renderResident(r)};clearInterval(timer);timer=setInterval(()=>{slideIndex=(slideIndex+1)%r.photos.length;const hero=document.querySelector('.hero');if(hero&&hero.tagName==='IMG')hero.src=currentPhoto(r);},4500);}}
async function boot(){try{const res=await fetch(DATA_URL,{cache:'no-store'});if(!res.ok)throw new Error('Residents konnten nicht geladen werden.');const data=await res.json();residents=(data.residents||[]).sort((a,b)=>String(a.name).localeCompare(String(b.name)));const urlId=selectedId();let resident=urlId?residents.find(x=>rid(x)===urlId):residents[0];if(resident&&!urlId){history.replaceState(null,'',`residents.html?resident=${encodeURIComponent(rid(resident))}`);}activeResidentId=resident?rid(resident):'';renderList();if(resident){renderResident(resident);}else{document.getElementById('content').innerHTML='<div class="empty"></div>';}}catch(e){document.getElementById('content').innerHTML=`<p class="error">${esc(e.message)}</p>`;}}
boot();
</script>
