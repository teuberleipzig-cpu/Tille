ht:900}.fact span{min-width:0}.socials{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 13px}.social-icon{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--grey);padding:3px}.social-icon:hover{background:#000}.social-icon img{width:16px;height:16px;display:block;filter:grayscale(1) brightness(0) contrast(2)}.social-icon:hover img{filter:grayscale(1) brightness(0) invert(1) contrast(2)}.actions{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 22px}.button{display:inline-block;background:var(--grey);border:0;padding:5px 8px;font-weight:900;text-transform:uppercase;color:#000}.button:hover{background:#000;color:#fff}.textblock{white-space:pre-wrap;line-height:1.24}.profile-tabs{max-width:520px;margin:0}.profile-tab-list{display:flex;align-items:flex-end;margin:0 0 8px}.profile-tab{border:1px solid #000;background:#000;color:#fff;padding:2px 6px;margin:0 3px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:900;text-transform:uppercase;line-height:1.1;cursor:pointer}.profile-tab[aria-selected="true"],.profile-tab:hover{background:#fff;color:#000}.profile-tab-panel[hidden]{display:none}.news-list{display:grid;gap:4px;margin:0 0 8px}.news-entry{display:grid;grid-template-columns:78px minmax(0,1fr);gap:8px;align-items:start}.news-entry[hidden]{display:none}.news-entry time{color:#555;font-weight:900;white-space:nowrap}.news-entry .textblock{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.15}.past-news-label{margin:8px 0 5px;color:#777;font-size:10px;font-weight:900;text-transform:uppercase}.past-news-label[hidden]{display:none}.news-controls{display:flex;gap:8px;align-items:center;margin:4px 0 0}.news-more{border:0;background:transparent;color:#777;padding:0;font:inherit;font-size:10px;font-weight:900;text-transform:uppercase;cursor:pointer}.news-more:hover{color:#000}.news-more[hidden]{display:none}.release-count{margin:0 0 6px;color:#777;font-size:10px;font-weight:900;text-transform:uppercase}.release-section{margin:0}.release-table{display:grid;gap:0;margin:0 0 10px;border-top:1px solid #ddd}.release-row{display:grid;grid-template-columns:54px minmax(90px,1fr) 94px 38px 78px 106px;gap:9px;align-items:start;border-bottom:1px solid #ddd;padding:6px 0;cursor:pointer}.release-row:hover{background:#f7f7f7}.release-cover{width:54px;height:54px;background:#eee;border:1px solid #ddd;overflow:hidden}.release-cover img{display:block;width:100%;height:100%;object-fit:cover}.release-cover-placeholder{display:grid;place-items:center;width:100%;height:100%;font-size:9px;color:#777;text-transform:uppercase}.release-name{font-weight:900;line-height:1.15}.release-label,.release-year,.release-format{line-height:1.15;color:#222}.release-links{line-height:1.25}.release-links a,.release-more,.all-releases-link{color:#04f;text-decoration:none}.release-links a:hover,.release-more:hover,.all-releases-link:hover{text-decoration:underline}.release-more{display:block;border:0;background:transparent;padding:2px 0 0;font:inherit;font-size:10px;cursor:pointer;text-align:left;text-transform:uppercase}.release-details{grid-column:1 / -1;padding:8px 0 8px;color:#222;line-height:1.25;cursor:default}.release-details[hidden]{display:none}.release-detail-grid{display:grid;grid-template-columns:82px minmax(0,1fr);gap:3px 8px;align-items:start}.release-detail-grid b{font-weight:900}.release-tracks{margin:4px 0 0;padding-left:15px}.all-releases-link{display:inline-block;margin-top:2px;font-size:11px;font-weight:900;text-transform:uppercase}.media-section{margin-top:24px}.media-section .section-title{display:inline-block;background:#000;color:#fff;padding:1px 3px;margin:0 0 10px;font-weight:900;text-transform:uppercase}.embed-item{margin-bottom:12px;width:100%;overflow:hidden}.embed-item iframe{max-width:100%;display:block}.footer{margin-top:92px;font-size:11px;font-weight:900;text-transform:uppercase}.footer small{display:block;margin-top:4px;font-size:10px;font-weight:400;text-transform:none}.footer a:hover{background:#000;color:#fff}.loading,.error{font-weight:900}.empty{min-height:700px}@media(max-width:820px){.page{width:100%;grid-template-columns:1fr}.sidebar{padding-top:20px;min-height:0}.main{padding-right:24px}.nav{width:auto}.profile-column,.media-section,.release-section{max-width:100%}.release-row{grid-template-columns:50px 1fr;gap:8px}.release-label,.release-year,.release-format,.release-links{grid-column:2}.release-details{grid-column:1 / -1}}

<body>
<div class="page">
  <main class="main">
    <header class="logo" aria-label="Distillery"><img src="assets/distillery-logo.png" alt="Distillery"></header>
    <nav class="nav"><a href="index.html">Dates</a><a href="news.html">News</a><a class="active" href="residents.html">Residents</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="history.html">History</a><a href="feedback.html">Feedback</a></nav>
    <div id="content"><p class="loading">Lade Residents...</p></div>
    <footer class="footer">DISTILLERY LEIPZIG | EGGEBRECHTSTRAẞE 2 | 04103 LEIPZIG | <a href="mailto:club@distillery.de">club@distillery.de</a> | <a href="tel:+4934135597400">0341 35597400</a><small><a href="impressum.html">Impressum</a> · <a href="datenschutz.html">Datenschutz</a></small></footer>
  </main>
  <aside class="sidebar"><span class="resident-list-title">Residents</span><div id="resident-list"></div></aside>
</div>
<script>
const DATA_URL='public/residents/data/residents.json';
const RELEASE_PREVIEW_LIMIT=5;
const NEWS_PREVIEW_LIMIT=10;
let residents=[];let timer=null;let activeResidentId='';let activeSlide=0;let activeLayer=0;
const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slug=t=>String(t||'resident').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'resident';
const rid=r=>r.id||slug(r.name);
function selectedId(){return new URLSearchParams(location.search).get('resident');}
function todayIso(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10);}
function isFilled(value){if(Array.isArray(value))return value.some(isFilled);if(value&&typeof value==='object')return Object.values(value).some(isFilled);return String(value??'').trim().length>0;}
function normalizeResidentMediaPath(src){const value=String(src||'').trim();if(!value||/^(https?:|data:|blob:)/i.test(value))return value;if(value.startsWith('/Tille/public/'))return value.slice('/Tille/'.length);if(value.startsWith('/public/'))return value.slice(1);if(value.startsWith('/residents/media/'))return `public${value}`;if(value.startsWith('residents/media/'))return `public/${value}`;return value;}
function cleanList(value){if(Array.isArray(value))return value.map(v=>typeof v==='string'?v:(v?.title||v?.name||mediaPath(v))).map(v=>String(v??'').trim()).filter(Boolean);return String(value??'').split(/\n|,/).map(x=>x.trim()).filter(Boolean);}
function firstValue(...values){for(const value of values){if(isFilled(value))return value}return'';}
function mediaPath(value){let src='';if(!value)return'';if(typeof value==='string')src=value;else if(typeof value==='object')src=value.url||value.src||value.imageUrl||value.coverUrl||value.coverImage||value.path||'';return normalizeResidentMediaPath(src);}
function mediaList(...values){for(const value of values){if(Array.isArray(value)){const out=value.map(mediaPath).filter(Boolean);if(out.length)return out}else if(String(value??'').trim()){return String(value).split(/\n|,/).map(x=>normalizeResidentMediaPath(x.trim())).filter(Boolean)}}return[];}
function textValue(value){if(Array.isArray(value))return value.map(v=>typeof v==='string'?v:mediaPath(v)).filter(Boolean).join('\n');return String(value??'');}
function renderList(){const id=activeResidentId||selectedId();document.getElementById('resident-list').innerHTML=residents.map(r=>`<a class="resident-link ${rid(r)===id?'active':''}" href="residents.html?resident=${encodeURIComponent(rid(r))}">${esc(r.name)}</a>`).join('')||'<span class="resident-link">Noch keine Residents</span>';}
function fact(label,value){const list=cleanList(value);const text=list.length?list.join(', '):String(value??'').trim();return text?`<div class="fact"><b>${esc(label)}</b><span>${esc(text)}</span></div>`:'';}
function favicon(domain){return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=32`;}
function socialIcon(label,url,domain){return url?`<a class="social-icon" href="${esc(url)}" target="_blank" rel="noopener noreferrer" title="${esc(label)}"><img src="${favicon(domain)}" alt="${esc(label)}"></a>`:'';}
function renderSocials(r){return [socialIcon('Instagram',firstValue(r.instagram,r.instagramUrl,r.instagramLink),'instagram.com'),socialIcon('Resident Advisor',firstValue(r.residentadvisor,r.residentAdvisor,r.ra,r.raUrl,r.residentAdvisorUrl),'ra.co'),socialIcon('Discogs',firstValue(r.discogs,r.discogsUrl),'discogs.com'),socialIcon('Beatport',firstValue(r.beatport,r.beatportUrl),'beatport.com'),socialIcon('Bandcamp',firstValue(r.bandcamp,r.bandcampUrl),'bandcamp.com'),socialIcon('SoundCloud',firstValue(r.soundcloud,r.soundcloudUrl,r.soundcloudLink),'soundcloud.com')].filter(Boolean).join('');}
function renderHero(r){const photos=mediaList(r.photoList,r.photos);if(!photos.length)return '<div class="hero-placeholder">Bilder-Slide</div>';return `<div class="hero-slider" id="hero-slider"><img class="active" src="${esc(photos[0])}" alt="${esc(r.name)}"><img src="${esc(photos[1]||photos[0])}" alt="${esc(r.name)}"></div>`;}
function setupSlider(r){clearInterval(timer);const photos=mediaList(r.photoList,r.photos);activeSlide=0;activeLayer=0;if(photos.length<2)return;timer=setInterval(()=>{activeSlide=(activeSlide+1)%photos.length;activeLayer=1-activeLayer;const imgs=document.querySelectorAll('#hero-slider img');if(imgs.length<2)return;imgs[activeLayer].src=photos[activeSlide];imgs[activeLayer].classList.add('active');imgs[1-activeLayer].classList.remove('active');},4500);}
function renderEmbeds(r){const codes=textValue(firstValue(r.embeds,r.mediaEmbeds)).trim();if(!codes)return '';return `<section class="media-section"><div class="section-title">Media</div><div class="embeds"><div class="embed-item">${codes}</div></div></section>`;}
function formatNewsDate(date){if(!date)return '';const [year,month,day]=String(date).split('-');return year&&month&&day?`${day}.${month}.${year}`:esc(date);}
function arr(v){return cleanList(v);}
function trackArr(rel){return Array.isArray(rel.trackDetails)&&rel.trackDetails.length?rel.trackDetails.map(t=>t.title||t.name||'').filter(Boolean):arr(rel.tracks);}
function hasManualReleaseOrder(r){return (r.releases||[]).some(rel=>rel.sortOrder!==undefined&&rel.sortOrder!==null&&rel.sortOrder!=='');}
function publishedReleases(r){const list=(r.releases||[]).map((rel,i)=>({rel,i})).filter(x=>x.rel&&x.rel.published!==false&&(x.rel.title||x.rel.releaseDate||x.rel.label));const manual=hasManualReleaseOrder(r);list.sort((a,b)=>manual?((Number(a.rel.sortOrder??a.i)-Number(b.rel.sortOrder??b.i))||a.i-b.i):((Number(!!b.rel.featured)-Number(!!a.rel.featured))||String(b.rel.releaseDate||b.rel.year||'').localeCompare(String(a.rel.releaseDate||a.rel.year||''))||String(a.rel.title||'').localeCompare(String(b.rel.title||''),'de')));return list.map(x=>x.rel);}
function releaseYear(rel){return rel.year||String(rel.releaseDate||'').slice(0,4)||'';}
function releaseFormat(rel){return [rel.releaseType,rel.format].filter(Boolean).join(' · ');}
function renderReleaseNews(r){return publishedReleases(r).filter(rel=>rel.releaseDate&&rel.title).map(rel=>({date:rel.releaseDate,text:rel.autoNewsText||`${rel.title} Release`,source:'release',id:rel.id||slug(rel.title)}));}
function renderNewsEntry(item,index){return `<article class="news-entry" data-news-index="${index}"><time datetime="${esc(item.date)}">${formatNewsDate(item.date)}</time><div class="textblock" title="${esc(item.text)}">${esc(item.text)}</div></article>`;}
function splitNewsItems(r){const today=todayIso();const manual=(r.newsItems||[]).filter(item=>item&&item.date&&String(item.text||'').trim());const items=[...manual,...renderReleaseNews(r)];const upcoming=items.filter(item=>String(item.date)>=today).sort((a,b)=>String(a.date).localeCompare(String(b.date))||String(a.text).localeCompare(String(b.text),'de'));const past=items.filter(item=>String(item.date)<today).sort((a,b)=>String(b.date).localeCompare(String(a.date))||String(a.text).localeCompare(String(b.text),'de'));return{upcoming,past};}
function renderNewsPanel(r){const {upcoming,past}=splitNewsItems(r);const total=upcoming.length+past.length;if(!total)return `<div class="textblock">${r.news?esc(r.news):'Keine News.'}</div>`;const initialVisible=Math.min(NEWS_PREVIEW_LIMIT,total);const upcomingHtml=upcoming.length?`<div class="news-list">${upcoming.map((item,index)=>renderNewsEntry(item,index)).join('')}</div>`:'';const pastHtml=past.length?`<div class="past-news-label" data-past-news-label>past news</div><div class="news-list">${past.map((item,index)=>renderNewsEntry(item,upcoming.length+index)).join('')}</div>`:'';const controls=total>NEWS_PREVIEW_LIMIT?`<div class="news-controls"><button class="news-more" type="button" data-news-less hidden>less</button><button class="news-more" type="button" data-news-more>more</button></div>`:'';return `<div class="news-paged" data-news-paged data-news-visible="${initialVisible}" data-news-total="${total}" data-news-upcoming-count="${upcoming.length}">${upcomingHtml}${pastHtml}${controls}</div>`;}
function releaseLinks(rel){return [['Discogs',rel.discogsUrl],['Beatport',rel.beatportUrl],['Bandcamp',rel.bandcampUrl],['Label',rel.labelUrl]].filter(x=>isFilled(x[1])).map(([label,url])=>`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`).join(' / ');}
function coverHtml(rel){const cover=firstValue(rel.coverImage,rel.coverUrl,rel.cover,rel.imageUrl);return cover?`<img src="${esc(mediaPath(cover))}" alt="${esc(rel.title||'Release Cover')}">`:'<div class="release-cover-placeholder">Cover</div>';}
function releaseDetails(rel){const artists=arr(rel.artists).join(', ');const tracks=trackArr(rel);const details=[['Releasedatum',rel.releaseDate?formatNewsDate(rel.releaseDate):''],['Artist(s)',artists],['Land',rel.country],['Art',rel.releaseType],['Format',rel.format],['Label',rel.label]].filter(x=>isFilled(x[1]));const trackHtml=tracks.length?`<b>Tracks</b><ol class="release-tracks">${tracks.map(t=>`<li>${esc(t)}</li>`).join('')}</ol>`:'';const desc=isFilled(rel.description)?`<div class="release-detail-grid"><b>Info</b><span>${esc(rel.description)}</span></div>`:'';return `<div class="release-details" hidden><div class="release-detail-grid">${details.map(([k,v])=>`<b>${esc(k)}</b><span>${esc(v)}</span>`).join('')}</div>${trackHtml}${desc}</div>`;}
function renderReleaseRow(rel){const links=releaseLinks(rel);return `<article class="release-row" data-release-row><div class="release-cover">${coverHtml(rel)}</div><div class="release-name">${esc(rel.title||'Ohne Titel')}</div><div class="release-label">${esc(rel.label||'')}</div><div class="release-year">${esc(releaseYear(rel))}</div><div class="release-format">${esc(releaseFormat(rel))}</div><div class="release-links">${links||''}<button class="release-more" type="button" data-release-more>Mehr Infos</button></div>${releaseDetails(rel)}</article>`;}
function renderReleasesPanel(r){const releases=publishedReleases(r);if(!releases.length)return '<p class="textblock">Noch keine Releases.</p>';const preview=releases.slice(0,RELEASE_PREVIEW_LIMIT);const visibleCount=preview.length;const allLink=releases.length>RELEASE_PREVIEW_LIMIT?`<a class="all-releases-link" href="resident-releases.html?resident=${encodeURIComponent(rid(r))}">Show all Releases</a>`:'';return `<section class="release-section"><div class="release-count">${visibleCount} of ${releases.length} releases</div><div class="release-table">${preview.map(renderReleaseRow).join('')}</div>${allLink}</section>`;}
function renderProfileTabs(r){const pressText=firstValue(r.pressText,r.bio,r.description,r.text,r.about);return `<section class="profile-tabs" data-profile-tabs><div class="profile-tab-list" role="tablist" aria-label="Resident Inhalte"><button class="profile-tab" type="button" role="tab" aria-selected="true" aria-controls="tab-presstext" data-profile-tab="presstext">Presstext</button><button class="profile-tab" type="button" role="tab" aria-selected="false" aria-controls="tab-news" data-profile-tab="news">News</button><button class="profile-tab" type="button" role="tab" aria-selected="false" aria-controls="tab-releases" data-profile-tab="releases">Releases</button></div><div class="profile-tab-panels"><div class="profile-tab-panel" id="tab-presstext" role="tabpanel" data-profile-panel="presstext"><div class="textblock">${esc(pressText||'')}</div></div><div class="profile-tab-panel" id="tab-news" role="tabpanel" data-profile-panel="news" hidden>${renderNewsPanel(r)}</div><div class="profile-tab-panel" id="tab-releases" role="tabpanel" data-profile-panel="releases" hidden>${renderReleasesPanel(r)}</div></div></section>`;}
function bindProfileTabs(){const root=document.querySelector('[data-profile-tabs]');if(!root)return;const tabs=[...root.querySelectorAll('[data-profile-tab]')];const panels=[...root.querySelectorAll('[data-profile-panel]')];tabs.forEach(tab=>{tab.addEventListener('click',()=>{const key=tab.dataset.profileTab;tabs.forEach(item=>item.setAttribute('aria-selected',String(item===tab)));panels.forEach(panel=>{panel.hidden=panel.dataset.profilePanel!==key;});});});}
function bindReleaseToggles(){document.querySelectorAll('[data-release-row]').forEach(row=>{row.addEventListener('click',e=>{if(e.target.closest('a'))return;const details=row.querySelector('.release-details');const button=row.querySelector('[data-release-more]');if(!details)return;const open=details.hasAttribute('hidden');details.toggleAttribute('hidden',!open);if(button)button.textContent=open?'Weniger Infos':'Mehr Infos';});});}
function updateNewsPagination(box){const visible=Number(box.dataset.newsVisible)||NEWS_PREVIEW_LIMIT;const total=Number(box.dataset.newsTotal)||0;const upcomingCount=Number(box.dataset.newsUpcomingCount)||0;box.querySelectorAll('[data-news-index]').forEach(item=>{item.hidden=Number(item.dataset.newsIndex)>=visible;});const pastLabel=box.querySelector('[data-past-news-label]');if(pastLabel)pastLabel.hidden=visible<=upcomingCount;const more=box.querySelector('[data-news-more]');const less=box.querySelector('[data-news-less]');if(more)more.hidden=visible>=total;if(less)less.hidden=visible<=NEWS_PREVIEW_LIMIT;}
function bindNewsPagination(){document.querySelectorAll('[data-news-paged]').forEach(box=>{updateNewsPagination(box);const more=box.querySelector('[data-news-more]');const less=box.querySelector('[data-news-less]');if(more)more.addEventListener('click',()=>{const total=Number(box.dataset.newsTotal)||0;const visible=Number(box.dataset.newsVisible)||NEWS_PREVIEW_LIMIT;box.dataset.newsVisible=String(Math.min(total,visible+NEWS_PREVIEW_LIMIT));updateNewsPagination(box);});if(less)less.addEventListener('click',()=>{const visible=Number(box.dataset.newsVisible)||NEWS_PREVIEW_LIMIT;box.dataset.newsVisible=String(Math.max(NEWS_PREVIEW_LIMIT,visible-NEWS_PREVIEW_LIMIT));updateNewsPagination(box);});});}
function renderResident(r){activeResidentId=rid(r);renderList();document.title='Distillery – '+r.name;const socials=renderSocials(r);const presskit=firstValue(r.presskit,r.presskitUrl,r.pressKitUrl);const press=presskit?`<a class="button" href="${esc(presskit)}" download="${esc(slug(r.name))}-presskit.zip">Download Presskit</a>`:'';const booking=firstValue(r.bookingEmail,r.booking,r.email);const book=booking?`<a class="button" href="mailto:${esc(booking)}">Book Artist</a>`:'';const facts=`${fact('City',r.city)}${fact('Genre',r.genre)}${fact('Labels',r.labels)}${fact('Projects',r.relatedProjects)}`;document.getElementById('content').innerHTML=`${renderHero(r)}<section class="profile-column"><h1 class="resident-title">${esc(r.name)}</h1><div class="facts">${facts}</div><div class="socials">${socials}</div><div class="actions">${press}${book}</div>${renderProfileTabs(r)}</section>${renderEmbeds(r)}`;bindProfileTabs();bindReleaseToggles();bindNewsPagination();setupSlider(r);}
async function boot(){try{const res=await fetch(DATA_URL,{cache:'no-store'});if(!res.ok)throw new Error('Residents konnten nicht geladen werden.');const data=await res.json();residents=(data.residents||[]);const urlId=selectedId();let resident=urlId?residents.find(x=>rid(x)===urlId):residents[0];if(resident&&!urlId){history.replaceState(null,'',`residents.html?resident=${encodeURIComponent(rid(resident))}`);}activeResidentId=resident?rid(resident):'';renderList();if(resident){renderResident(resident);}else{document.getElementById('content').innerHTML='<div class="empty"></div>';}}catch(e){document.getElementById('content').innerHTML=`<p class="error">${esc(e.message)}</p>`;}}
