name: Build updated placeholder artist list once

on:
  push:
    paths:
      - "scripts/build_updated_placeholder_artist_list_once.py"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build updated artist list
        run: python scripts/build_updated_placeholder_artist_list_once.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/updated_placeholder_artist_list.txt reports/updated_placeholder_artist_sources.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build updated placeholder artist list [skip ci]"
            git push
          fi
