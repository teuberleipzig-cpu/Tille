name: Update supplied artist info once

on:
  pull_request:
    paths:
      - ".github/update-supplied-artist-info-pr-trigger.txt"

permissions:
  contents: write

jobs:
  update-artist-info:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update supplied artist info
        run: python scripts/update_supplied_artist_info_once.py

      - name: Commit updated events and report to pull request branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/events/data/events.json reports/supplied_artist_info_update_report.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Apply supplied artist info across events data [skip ci]"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
