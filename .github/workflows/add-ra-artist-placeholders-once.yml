name: Add RA artist placeholders once

on:
  push:
    paths:
      - "scripts/add_ra_artist_placeholders_once.py"

permissions:
  contents: write

jobs:
  add-placeholders:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Add placeholders to RA artists
        run: python scripts/add_ra_artist_placeholders_once.py

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/events/data/events.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add placeholders to Resident Advisor artist info [skip ci]"
            git push
          fi
