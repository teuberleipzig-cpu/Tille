name: Merge Resident Advisor events once

on:
  push:
    paths:
      - ".github/ra-merge-trigger.txt"

permissions:
  contents: write

jobs:
  merge-ra-events:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Merge RA events
        run: python scripts/merge_ra_events_once.py

      - name: Commit merged events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/events/data/events.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Merge Resident Advisor events into events.json [skip ci]"
            git push
          fi
