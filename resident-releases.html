    :root{--grey:#d9d9d9;--orange:#e49a78}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;color:#000;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.15}a{color:inherit;text-decoration:none}.page{width:800px;min-height:100vh;display:grid;grid-template-columns:606px 194px;background:#fff}.main{padding:18px 58px 14px 30px;background:#fff}.sidebar{background:#000;color:#777;padding:93px 14px 14px 24px;min-height:100vh}.logo{width:280px;height:78px;margin:0 0 8px -35px;overflow:visible}.logo img{display:block;width:280px;height:78px;object-fit:contain}.nav{width:520px;margin-bottom:30px;font-size:13px;font-weight:900;text-transform:uppercase;line-height:1.13}.nav a{display:inline-block;padding:0 2px;margin:0 1px 3px 0;background:var(--grey);color:#000}.nav a:hover,.nav a.active{color:#fff;background:#000}.resident-list-title{display:block;margin:0 0 8px;color:#fff;font-weight:900;text-transform:uppercase}.resident-link{display:block;width:max-content;max-width:155px;color:#777;text-transform:uppercase;font-size:12px;line-height:1.35;font-weight:900}.resident-link:hover,.resident-link.active{color:#fff}.hero-slider{width:100%;aspect-ratio:16/9;background:#eee;position:relative;overflow:hidden;margin:0 0 22px}.hero-slider img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 2s ease}.hero-slider img.active{opacity:1}.hero-placeholder{display:grid;place-items:center;width:100%;aspect-ratio:16/9;background:#eee;color:#777;font-size:24px;margin:0 0 22px;text-transform:uppercase}.resident-title{display:block;width:100%;background:var(--orange);padding:2px 4px;font-size:20px;line-height:1.05;font-weight:900;text-transform:uppercase;margin:0 0 18px}.section-title{display:inline-block;background:#000;color:#fff;padding:1px 3px;margin:0 0 7px;font-weight:900;text-transform:uppercase}.release-section{max-width:520px}.release-table{display:grid;gap:0;margin:2px 0 10px;border-top:1px solid #dd <body>
<div class="page">
  <main class="main">
    <header class="logo" aria-label="Distillery"><img src="assets/distillery-logo.png" alt="Distillery"></header>
    <nav class="nav"><a href="index.html">Dates</a><a href="news.html">News</a><a class="active" href="residents.html">Residents</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="history.html">History</a><a href="feedback.html">Feedback</a></nav>
    <div id="content"><p class="loading">Lade Releases...</p></div>
    <footer class="footer">DISTILLERY LEIPZIG | EGGEBRECHTSTRAẞE 2 | 04103 LEIPZIG | <a href="mailto:club@distillery.de">club@distillery.de</a> | <a href="tel:+4934135597400">0341 35597400</a><small><a href="impressum.html">Impressum</a> · <a href="datenschutz.html">Datenschutz</a></small></footer>
  </main>
  <aside class="sidebar"><span class="resident-list-title">Residents</span><div id="resident-list"></div></aside>
</div>
<div aria-hidden="true" style="position:fixed;left:6px;bottom:6px;z-index:9999;background:#000;color:#fff;border:1px solid #fff;padding:3px 5px;font:10px/1.1 Arial,Helvetica,sans-serif;text-transform:uppercase;letter-spacing:.03em;opacity:.86;pointer-events:none">TEST BUILD<br>public-media-fix-4</div>
<script>
const DATA_URL='public/residents/data/residents.json';
let residents=[];let timer=null;let activeResidentId='';let activeSlide=0;let activeLayer=0;
const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slug=t=>String(t||'resident').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'resident';
const rid=r=>r.id||slug(r.name);
function selectedId(){return new URLSearchParams(location.search).get('resident');}
function normalizeResidentMediaPath(src){const value=String(src||'').trim();if(!value||/^(https?:|data:|blob:)/i.test(value))return value;if(value.startsWith('/Tille/public/'))return value.slice('/Tille/'.length);if(value.startsWith('/public/'))return value.slice(1);if(value.startsWith('/residents/media/'))return `public${value}`;if(value.startsWith('residents/media/'))return `public/${value}`;return value;}
function mediaPath(value){let src='';if(!value)return'';if(typeof value==='string')src=value;else if(typeof value==='object')src=value.url||value.src||value.imageUrl||value.coverUrl||value.coverImage||value.path||'';return normalizeResidentMediaPath(src);}
function mediaList(...values){for(const value of values){if(Array.isArray(value)){const out=value.map(mediaPath).filter(Boolean);if(out.length)return out}else if(String(value??'').trim()){return String(value).split(/\n|,/).map(x=>normalizeResidentMediaPath(x.trim())).filter(Boolean)}}return[];}
function renderList(){const id=activeResidentId||selectedId();document.getElementById('resident-list').innerHTML=residents.map(r=>`<a class="resident-link ${rid(r)===id?'active':''}" href="resident-releases.html?resident=${encodeURIComponent(rid(r))}">${esc(r.name)}</a>`).join('')||'<span class="resident-link">Noch keine Residents</span>';}
function renderHero(r){const photos=mediaList(r.photoList,r.photos);if(!photos.length)return '<div class="hero-placeholder">Bilder-Slide</div>';return `<div class="hero-slider" id="hero-slider"><img class="active" src="${esc(photos[0])}" alt="${esc(r.name)}"><img src="${esc(photos[1]||photos[0])}" alt="${esc(r.name)}"></div>`;}
function setupSlider(r){clearInterval(timer);const photos=mediaList(r.photoList,r.photos);activeSlide=0;activeLayer=0;if(photos.length<2)return;timer=setInterval(()=>{activeSlide=(activeSlide+1)%photos.length;activeLayer=1-activeLayer;const imgs=document.querySelectorAll('#hero-slider img');if(imgs.length<2)return;imgs[activeLayer].src=photos[activeSlide];imgs[activeLayer].classList.add('active');imgs[1-activeLayer].classList.remove('active');},4500);}
function formatDate(date){if(!date)return '';const [year,month,day]=String(date).split('-');return year&&month&&day?`${day}.${month}.${year}`:esc(date);}
function arr(v){return Array.isArray(v)?v.filter(Boolean):String(v||'').split(/\n|,/).map(x=>x.trim()).filter(Boolean);}
function hasManualReleaseOrder(r){return (r.releases||[]).some(rel=>rel.sortOrder!==undefined&&rel.sortOrder!==null&&rel.sortOrder!=='');}
function publishedReleases(r){const list=(r.releases||[]).map((rel,i)=>({rel,i})).filter(x=>x.rel&&x.rel.published!==false&&(x.rel.title||x.rel.releaseDate||x.rel.label));const manual=hasManualReleaseOrder(r);list.sort((a,b)=>manual?((Number(a.rel.sortOrder??a.i)-Number(b.rel.sortOrder??b.i))||a.i-b.i):((Number(!!b.rel.featured)-Number(!!a.rel.featured))||String(b.rel.releaseDate||b.rel.year||'').localeCompare(String(a.rel.releaseDate||a.rel.year||''))||String(a.rel.title||'').localeCompare(String(b.rel.title||''),'de')));return list.map(x=>x.rel);}
function releaseYear(rel){return rel.year||String(rel.releaseDate||'').slice(0,4)||'';}
function releaseFormat(rel){return [rel.releaseType,rel.format].filter(Boolean).join(' · ');}
function releaseLinks(rel){return [['Discogs',rel.discogsUrl],['Beatport',rel.beatportUrl],['Bandcamp',rel.bandcampUrl],['Label',rel.labelUrl]].filter(x=>x[1]).map(([label,url])=>`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`).join(' / ');}
function coverHtml(rel){const cover=rel.coverImage||rel.coverUrl||rel.cover||rel.imageUrl;return cover?`<img src="${esc(mediaPath(cover))}" alt="${esc(rel.title||'Release Cover')}">`:'<div class="release-cover-placeholder">Cover</div>';}
function releaseDetails(rel){const artists=arr(rel.artists).join(', ');const tracks=arr(rel.tracks);const details=[['Releasedatum',rel.releaseDate?formatDate(rel.releaseDate):''],['Artist(s)',artists],['Land',rel.country],['Art',rel.releaseType],['Format',rel.format],['Label',rel.label]].filter(x=>x[1]);const trackHtml=tracks.length?`<b>Tracks</b><ol class="release-tracks">${tracks.map(t=>`<li>${esc(t)}</li>`).join('')}</ol>`:'';const desc=rel.description?`<div class="release-detail-grid"><b>Info</b><span>${esc(rel.description)}</span></div>`:'';return `<div class="release-details" hidden><div class="release-detail-grid">${details.map(([k,v])=>`<b>${esc(k)}</b><span>${esc(v)}</span>`).join('')}</div>${trackHtml}${desc}</div>`;}
function renderReleaseRow(rel){const links=releaseLinks(rel);return `<article class="release-row" data-release-row><div class="release-cover">${coverHtml(rel)}</div><div class="release-name">${esc(rel.title||'Ohne Titel')}</div><div class="release-label">${esc(rel.label||'')}</div><div class="release-year">${esc(releaseYear(rel))}</div><div class="release-format">${esc(releaseFormat(rel))}</div><div class="release-links">${links||''}<button class="release-more" type="button" data-release-more>Mehr Infos</button></div>${releaseDetails(rel)}</article>`;}
function bindReleaseToggles(){document.querySelectorAll('[data-release-row]').forEach(row=>{row.addEventListener('click',e=>{if(e.target.closest('a'))return;const details=row.querySelector('.release-details');const button=row.querySelector('[data-release-more]');if(!details)return;const open=details.hasAttribute('hidden');details.toggleAttribute('hidden',!open);if(button)button.textContent=open?'Weniger Infos':'Mehr Infos';});});}
function renderPage(r){activeResidentId=rid(r);renderList();document.title='Distillery – Releases – '+r.name;const releases=publishedReleases(r);document.getElementById('content').innerHTML=`${renderHero(r)}<h1 class="resident-title">${esc(r.name)}</h1><section class="release-section"><div class="section-title">Releases</div>${releases.length?`<div class="release-table">${releases.map(renderReleaseRow).join('')}</div>`:'<p class="empty">Noch keine Releases.</p>'}<a class="back-link" href="residents.html?resident=${encodeURIComponent(rid(r))}">Zurück zum Artist</a></section>`;bindReleaseToggles();setupSlider(r);}
async function boot(){try{const res=await fetch(DATA_URL,{cache:'no-store'});if(!res.ok)throw new Error('Residents konnten nicht geladen werden.');const data=await res.json();residents=(data.residents||[]).sort((a,b)=>String(a.name).localeCompare(String(b.name)));const urlId=selectedId();const resident=urlId?residents.find(x=>rid(x)===urlId):residents[0];activeResidentId=resident?rid(resident):'';renderList();if(resident){renderPage(resident);}else{document.getElementById('content').innerHTML='<p class="error">Resident nicht gefunden.</p>';}}catch(e){document.getElementById('content').innerHTML=`<p class="error">${esc(e.message)}</p>`;}}
boot();
</script>
